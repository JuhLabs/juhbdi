<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JuhBDI — Governance Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   DESIGN TOKENS — Catppuccin Mocha + JuhBDI accents
   ================================================================ */
:root {
  --base: #1e1e2e;
  --mantle: #181825;
  --crust: #11111b;
  --surface0: #313244;
  --surface1: #45475a;
  --surface2: #585b70;
  --text: #cdd6f4;
  --subtext0: #a6adc8;
  --subtext1: #bac2de;
  --lavender: #b4befe;
  --blue: #89b4fa;
  --sapphire: #74c7ec;
  --teal: #94e2d5;
  --green: #a6e3a1;
  --yellow: #f9e2af;
  --peach: #fab387;
  --red: #f38ba8;
  --mauve: #cba6f7;
  --pink: #f5c2e7;
  --flamingo: #f2cdcd;
  --rosewater: #f5e0dc;
  --overlay0: #6c7086;
  --overlay1: #7f849c;
  --overlay2: #9399b2;

  --font-display: 'Outfit', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', 'Fira Code', monospace;

  /* Panel accent colors */
  --accent-exec: var(--lavender);
  --accent-trust: var(--mauve);
  --accent-cost: var(--green);
  --accent-context: var(--sapphire);
  --accent-trail: var(--teal);
  --accent-memory: var(--pink);
}

/* ================================================================
   RESET & BASE
   ================================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-display);
  background: var(--crust);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ================================================================
   ANIMATED BACKGROUND — Floating gradient orbs + noise
   ================================================================ */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.07;
  animation: orbFloat 25s ease-in-out infinite;
}

.bg-orb:nth-child(1) {
  width: 600px; height: 600px;
  background: var(--mauve);
  top: -200px; left: -100px;
  animation-delay: 0s;
}

.bg-orb:nth-child(2) {
  width: 500px; height: 500px;
  background: var(--blue);
  top: 40%; right: -150px;
  animation-delay: -8s;
  animation-duration: 30s;
}

.bg-orb:nth-child(3) {
  width: 400px; height: 400px;
  background: var(--teal);
  bottom: -100px; left: 30%;
  animation-delay: -16s;
  animation-duration: 22s;
}

@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(40px, -30px) scale(1.05); }
  50% { transform: translate(-20px, 40px) scale(0.95); }
  75% { transform: translate(30px, 20px) scale(1.02); }
}

/* Subtle grid overlay */
.bg-layer::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(49, 50, 68, 0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(49, 50, 68, 0.08) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ================================================================
   HEADER
   ================================================================ */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  height: 56px;
  background: rgba(17, 17, 27, 0.85);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  border-bottom: 1px solid rgba(180, 190, 254, 0.06);
}

/* Gradient accent line at very top */
.header::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--mauve), var(--lavender), var(--blue), var(--teal), var(--green));
  opacity: 0.8;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-brand {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 1.2rem;
  background: linear-gradient(135deg, var(--lavender), var(--mauve));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-divider {
  width: 1px;
  height: 20px;
  background: var(--surface1);
}

.header-subtitle {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 0.78rem;
  color: var(--subtext0);
  letter-spacing: 0.06em;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.connection-indicator {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(49, 50, 68, 0.4);
  border: 1px solid rgba(49, 50, 68, 0.6);
  transition: all 0.3s ease;
}

.connection-indicator.connected {
  border-color: rgba(166, 227, 161, 0.2);
  background: rgba(166, 227, 161, 0.06);
}

.connection-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--overlay0);
  transition: all 0.3s ease;
}

.connection-indicator.connected .connection-dot {
  background: var(--green);
  box-shadow: 0 0 8px rgba(166, 227, 161, 0.6);
  animation: dotPulse 2s ease-in-out infinite;
}

@keyframes dotPulse {
  0%, 100% { box-shadow: 0 0 6px rgba(166, 227, 161, 0.4); }
  50% { box-shadow: 0 0 12px rgba(166, 227, 161, 0.8); }
}

.connection-label {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  font-weight: 500;
  color: var(--overlay0);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  transition: color 0.3s ease;
}

.connection-indicator.connected .connection-label {
  color: var(--green);
}

.header-time {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--subtext0);
  letter-spacing: 0.02em;
}

/* ================================================================
   DASHBOARD GRID
   ================================================================ */
.dashboard {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 1.8fr 1fr;
  grid-template-rows: auto auto auto;
  gap: 16px;
  padding: 20px 28px 48px;
  max-width: 1520px;
  margin: 0 auto;
}

@media (max-width: 1100px) {
  .dashboard { grid-template-columns: 1fr; }
  .dashboard .card { grid-column: 1 !important; }
}

/* ================================================================
   CARD BASE — Frosted glass with colored top accent
   ================================================================ */
.card {
  position: relative;
  background: rgba(24, 24, 37, 0.75);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(69, 71, 90, 0.35);
  border-radius: 16px;
  padding: 22px 24px;
  opacity: 0;
  transform: translateY(16px);
  animation: cardEnter 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.25s ease;
  overflow: hidden;
}

/* Colored top accent bar */
.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 24px;
  right: 24px;
  height: 2px;
  border-radius: 0 0 2px 2px;
  opacity: 0.6;
  transition: opacity 0.3s ease;
}

.card:hover {
  border-color: rgba(69, 71, 90, 0.55);
  transform: translateY(-2px);
}

.card:hover::before {
  opacity: 1;
}

/* Per-panel accent colors */
.card:nth-child(1) { grid-column: 1; grid-row: 1; animation-delay: 0.04s; }
.card:nth-child(1)::before { background: linear-gradient(90deg, var(--accent-exec), transparent); }
.card:nth-child(1):hover { box-shadow: 0 8px 32px -8px rgba(180, 190, 254, 0.08); }

.card:nth-child(2) { grid-column: 2; grid-row: 1; animation-delay: 0.08s; }
.card:nth-child(2)::before { background: linear-gradient(90deg, var(--accent-trust), transparent); }
.card:nth-child(2):hover { box-shadow: 0 8px 32px -8px rgba(203, 166, 247, 0.08); }

.card:nth-child(3) { grid-column: 1; grid-row: 2; animation-delay: 0.12s; }
.card:nth-child(3)::before { background: linear-gradient(90deg, var(--accent-cost), transparent); }
.card:nth-child(3):hover { box-shadow: 0 8px 32px -8px rgba(166, 227, 161, 0.08); }

.card:nth-child(4) { grid-column: 2; grid-row: 2; animation-delay: 0.16s; }
.card:nth-child(4)::before { background: linear-gradient(90deg, var(--accent-context), transparent); }
.card:nth-child(4):hover { box-shadow: 0 8px 32px -8px rgba(116, 199, 236, 0.08); }

.card:nth-child(5) { grid-column: 1; grid-row: 3; animation-delay: 0.20s; }
.card:nth-child(5)::before { background: linear-gradient(90deg, var(--accent-trail), transparent); }
.card:nth-child(5):hover { box-shadow: 0 8px 32px -8px rgba(148, 226, 213, 0.08); }

.card:nth-child(6) { grid-column: 2; grid-row: 3; animation-delay: 0.24s; }
.card:nth-child(6)::before { background: linear-gradient(90deg, var(--accent-memory), transparent); }
.card:nth-child(6):hover { box-shadow: 0 8px 32px -8px rgba(245, 194, 231, 0.08); }

@keyframes cardEnter {
  to { opacity: 1; transform: translateY(0); }
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.card-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.78rem;
  color: var(--subtext0);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ================================================================
   BADGES & PILLS
   ================================================================ */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.03em;
}

.badge-wave {
  background: rgba(180, 190, 254, 0.12);
  color: var(--lavender);
  border: 1px solid rgba(180, 190, 254, 0.15);
}

.badge-phase {
  background: rgba(137, 180, 250, 0.12);
  color: var(--blue);
  border: 1px solid rgba(137, 180, 250, 0.15);
  margin-left: 6px;
}

.tier-badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 14px;
  border-radius: 20px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  border: 1px solid transparent;
}

.tier-intern     { background: rgba(108, 112, 134, 0.15); color: var(--overlay1); border-color: rgba(108, 112, 134, 0.2); }
.tier-junior     { background: rgba(137, 180, 250, 0.12); color: var(--blue); border-color: rgba(137, 180, 250, 0.18); }
.tier-senior     { background: rgba(166, 227, 161, 0.12); color: var(--green); border-color: rgba(166, 227, 161, 0.18); }
.tier-principal  { background: rgba(203, 166, 247, 0.12); color: var(--mauve); border-color: rgba(203, 166, 247, 0.18); }
.tier-new        { background: rgba(166, 173, 200, 0.08); color: var(--subtext0); border-color: rgba(166, 173, 200, 0.12); }

/* ================================================================
   TYPE BADGES (trail)
   ================================================================ */
.type-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 0.58rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.type-command      { background: rgba(116, 199, 236, 0.14); color: var(--sapphire); }
.type-decision     { background: rgba(180, 190, 254, 0.14); color: var(--lavender); }
.type-routing      { background: rgba(137, 180, 250, 0.14); color: var(--blue); }
.type-execution    { background: rgba(166, 227, 161, 0.14); color: var(--green); }
.type-error        { background: rgba(243, 139, 168, 0.14); color: var(--red); }
.type-governance   { background: rgba(203, 166, 247, 0.14); color: var(--mauve); }
.type-verification { background: rgba(148, 226, 213, 0.14); color: var(--teal); }
.type-recovery     { background: rgba(249, 226, 175, 0.14); color: var(--yellow); }
.type-default      { background: rgba(88, 91, 112, 0.14); color: var(--overlay1); }

/* ================================================================
   PROGRESS BAR
   ================================================================ */
.progress-track {
  width: 100%;
  height: 6px;
  background: var(--surface0);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--lavender), var(--blue));
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
}

.progress-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
  animation: shimmer 2.5s ease-in-out infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.progress-label {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--subtext0);
  margin-top: 8px;
}

/* ================================================================
   EMPTY STATE
   ================================================================ */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  text-align: center;
  gap: 12px;
}

.empty-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  line-height: 1;
  opacity: 0.3;
}

.empty-icon-exec { background: rgba(180, 190, 254, 0.08); }
.empty-icon-cost { background: rgba(166, 227, 161, 0.08); }
.empty-icon-mem  { background: rgba(245, 194, 231, 0.08); }

.empty-text {
  color: var(--overlay1);
  font-size: 0.82rem;
  line-height: 1.6;
  font-weight: 400;
  max-width: 300px;
}

.empty-text code {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  background: rgba(180, 190, 254, 0.08);
  color: var(--lavender);
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid rgba(180, 190, 254, 0.1);
}

/* ================================================================
   PANEL 1: EXECUTION STATUS
   ================================================================ */
.exec-wave-info {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}

.exec-last-result {
  margin-top: 14px;
  padding: 10px 14px;
  background: rgba(49, 50, 68, 0.35);
  border-radius: 10px;
  border-left: 3px solid var(--surface1);
}

.exec-last-result .label {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--subtext0);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

.exec-last-result .value {
  font-size: 0.8rem;
  color: var(--text);
}

/* ================================================================
   PANEL 2: TRUST & GOVERNANCE
   ================================================================ */
.trust-top {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  margin-bottom: 14px;
}

.gauge-container {
  position: relative;
  width: 100px;
  height: 100px;
  flex-shrink: 0;
}

.gauge-container svg {
  width: 100px;
  height: 100px;
  filter: drop-shadow(0 0 8px var(--gauge-glow, transparent));
  transition: filter 0.4s ease;
}

.gauge-track {
  fill: none;
  stroke: rgba(49, 50, 68, 0.8);
  stroke-width: 6;
}

.gauge-fill {
  fill: none;
  stroke-width: 6;
  stroke-linecap: round;
  transform: rotate(-90deg);
  transform-origin: center;
  transition: stroke-dashoffset 1s cubic-bezier(0.22, 1, 0.36, 1), stroke 0.4s ease;
}

.gauge-value {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.gauge-number {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 1.5rem;
  line-height: 1;
  color: var(--text);
}

.gauge-label-sm {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  color: var(--overlay1);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 2px;
}

.trust-meta {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-top: 4px;
}

.compliance-bar { margin-top: 2px; }

.compliance-label {
  font-family: var(--font-mono);
  font-size: 0.64rem;
  color: var(--overlay1);
  margin-bottom: 5px;
  display: flex;
  justify-content: space-between;
  letter-spacing: 0.02em;
}

.compliance-track {
  width: 100%;
  height: 4px;
  background: rgba(49, 50, 68, 0.6);
  border-radius: 2px;
  overflow: hidden;
}

.compliance-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal), var(--green));
  border-radius: 2px;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}

.gov-decisions {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.gov-decision-item {
  padding: 8px 12px;
  background: rgba(49, 50, 68, 0.25);
  border-radius: 8px;
  border-left: 2px solid var(--mauve);
  font-size: 0.75rem;
  color: var(--subtext0);
  line-height: 1.4;
  transition: background 0.2s ease;
}

.gov-decision-item:hover {
  background: rgba(49, 50, 68, 0.4);
}

.gov-decision-item .decision-time {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--overlay0);
  letter-spacing: 0.02em;
}

/* ================================================================
   PANEL 3: COST INTELLIGENCE
   ================================================================ */
.cost-hero {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 4px;
}

.cost-big-number {
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 2.6rem;
  line-height: 1;
  background: linear-gradient(135deg, var(--green), var(--teal));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.cost-big-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--overlay1);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 18px;
}

.cost-comparison {
  display: flex;
  gap: 12px;
  margin-bottom: 18px;
}

.cost-bar-group { flex: 1; }

.cost-bar-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 5px;
}

.cost-bar-name {
  font-family: var(--font-mono);
  font-size: 0.64rem;
  color: var(--overlay1);
}

.cost-bar-value {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text);
}

.cost-bar-track {
  width: 100%;
  height: 5px;
  background: rgba(49, 50, 68, 0.5);
  border-radius: 3px;
  overflow: hidden;
}

.cost-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}

.cost-bar-fill.actual { background: linear-gradient(90deg, var(--green), var(--teal)); }
.cost-bar-fill.opus   { background: linear-gradient(90deg, var(--mauve), var(--pink)); }

.model-dist { margin-top: 4px; }

.model-dist-label {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--overlay1);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}

.model-stacked-bar {
  width: 100%;
  height: 8px;
  background: rgba(49, 50, 68, 0.4);
  border-radius: 4px;
  overflow: hidden;
  display: flex;
}

.model-stacked-bar .segment {
  height: 100%;
  transition: width 0.6s ease;
}

.segment-haiku   { background: var(--teal); }
.segment-sonnet  { background: var(--blue); }
.segment-opus    { background: var(--mauve); }
.segment-unknown { background: var(--surface1); }

.model-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 8px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--overlay1);
}

.legend-dot {
  width: 6px;
  height: 6px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ================================================================
   PANEL 4: CONTEXT HEALTH
   ================================================================ */
.context-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
}

.context-level {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.level-normal   { color: var(--green); }
.level-warning  { color: var(--yellow); }
.level-urgent   { color: var(--peach); }
.level-critical { color: var(--red); }
.level-emergency { color: var(--red); text-shadow: 0 0 16px rgba(243, 139, 168, 0.5); }

.pulse-warning { animation: pulseWarn 1.5s ease-in-out infinite; }

@keyframes pulseWarn {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* ================================================================
   PANEL 5: DECISION TRAIL
   ================================================================ */
.card-trail {
  background: rgba(17, 17, 27, 0.85) !important;
}

.trail-header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.trail-count {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--overlay0);
}

.live-indicator {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 12px;
  background: rgba(166, 227, 161, 0.06);
  border: 1px solid rgba(166, 227, 161, 0.12);
}

.live-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--green);
  animation: livePulse 2s ease-in-out infinite;
}

@keyframes livePulse {
  0%, 100% { box-shadow: 0 0 4px rgba(166, 227, 161, 0.5); opacity: 1; }
  50% { box-shadow: 0 0 10px rgba(166, 227, 161, 0.8); opacity: 0.6; }
}

.live-text {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  font-weight: 600;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.trail-scroll {
  max-height: 280px;
  overflow-y: auto;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  line-height: 1.6;
  scrollbar-width: thin;
  scrollbar-color: var(--surface1) transparent;
}

.trail-scroll::-webkit-scrollbar { width: 4px; }
.trail-scroll::-webkit-scrollbar-track { background: transparent; }
.trail-scroll::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 2px; }

.trail-entry {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid rgba(49, 50, 68, 0.2);
  transition: background 0.15s ease;
}

.trail-entry:hover {
  background: rgba(49, 50, 68, 0.15);
}

.trail-entry:last-child { border-bottom: none; }

.trail-ts {
  color: var(--overlay0);
  font-size: 0.6rem;
  white-space: nowrap;
  flex-shrink: 0;
  font-weight: 400;
}

.trail-desc {
  color: var(--subtext0);
  word-break: break-word;
}

.trail-empty {
  color: var(--overlay0);
  font-style: italic;
  padding: 32px 0;
  text-align: center;
  font-size: 0.72rem;
}

/* ================================================================
   PANEL 6: INTELLIGENCE MEMORY
   ================================================================ */
.memory-stats-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.memory-stat-box {
  flex: 1;
  text-align: center;
  padding: 12px 8px;
  background: rgba(49, 50, 68, 0.25);
  border-radius: 10px;
  border: 1px solid rgba(69, 71, 90, 0.2);
  transition: border-color 0.2s ease, background 0.2s ease;
}

.memory-stat-box:hover {
  border-color: rgba(69, 71, 90, 0.4);
  background: rgba(49, 50, 68, 0.4);
}

.memory-stat-num {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 1.4rem;
  color: var(--text);
  line-height: 1;
}

.memory-stat-label {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--overlay1);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 5px;
}

.reflexion-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.reflexion-item {
  padding: 10px 12px;
  background: rgba(49, 50, 68, 0.2);
  border-radius: 10px;
  border-left: 2px solid var(--lavender);
  cursor: pointer;
  transition: background 0.2s ease, border-color 0.2s ease;
}

.reflexion-item:hover {
  background: rgba(49, 50, 68, 0.4);
  border-color: var(--pink);
}

.reflexion-task {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 2px;
}

.reflexion-lesson {
  font-size: 0.7rem;
  color: var(--subtext0);
  line-height: 1.4;
  display: none;
}

.reflexion-item.expanded .reflexion-lesson {
  display: block;
  margin-top: 6px;
}

.reflexion-outcome {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.58rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 1px 6px;
  border-radius: 4px;
  margin-top: 4px;
}

.outcome-success { background: rgba(166, 227, 161, 0.12); color: var(--green); }
.outcome-failure { background: rgba(243, 139, 168, 0.12); color: var(--red); }
.outcome-partial { background: rgba(249, 226, 175, 0.12); color: var(--yellow); }

/* ================================================================
   ANIMATIONS
   ================================================================ */
.value-changed {
  animation: valueGlow 1s ease;
}

@keyframes valueGlow {
  0% { text-shadow: 0 0 16px rgba(180, 190, 254, 0.6); }
  100% { text-shadow: none; }
}

/* ================================================================
   UTILITY
   ================================================================ */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg-layer">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>

<!-- ============================================================
     HEADER
     ============================================================ -->
<header class="header">
  <div class="header-left">
    <span class="header-brand">JuhBDI</span>
    <div class="header-divider"></div>
    <span class="header-subtitle">Governance Dashboard</span>
  </div>
  <div class="header-right">
    <div id="connIndicator" class="connection-indicator">
      <div class="connection-dot"></div>
      <span class="connection-label">Offline</span>
    </div>

  </div>
</header>

<!-- ============================================================
     DASHBOARD GRID
     ============================================================ -->
<main class="dashboard">

  <!-- PANEL 1: Execution Status -->
  <section class="card" id="panelExec">
    <div class="card-header">
      <span class="card-title">Execution Status</span>
      <div id="execBadges"></div>
    </div>
    <div id="execBody"></div>
  </section>

  <!-- PANEL 2: Trust & Governance -->
  <section class="card" id="panelTrust">
    <div class="card-header">
      <span class="card-title">Trust &amp; Governance</span>
    </div>
    <div id="trustBody"></div>
  </section>

  <!-- PANEL 3: Cost Intelligence -->
  <section class="card" id="panelCost">
    <div class="card-header">
      <span class="card-title">Cost Intelligence</span>
    </div>
    <div id="costBody"></div>
  </section>

  <!-- PANEL 4: Context Health -->
  <section class="card" id="panelContext">
    <div class="card-header">
      <span class="card-title">Context Health</span>
    </div>
    <div id="contextBody"></div>
  </section>

  <!-- PANEL 5: Decision Trail -->
  <section class="card card-trail" id="panelTrail">
    <div class="card-header">

          <div class="live-dot"></div>
          <span class="live-text">Live</span>
        </div>
      </div>
    </div>
    <div id="trailBody" class="trail-scroll"></div>
  </section>

  <!-- PANEL 6: Intelligence Memory -->
  <section class="card" id="panelMemory">
    <div class="card-header">
      <span class="card-title">Intelligence Memory</span>
    </div>
    <div id="memoryBody"></div>
  </section>

</main>

<script>
/* ================================================================
   GLOBALS
   ================================================================ */
let connected = false;
let lastTrailCount = 0;

/* ================================================================
   HELPERS
   ================================================================ */
function $(id) { return document.getElementById(id); }

function el(tag, attrs, children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'className') node.className = v;
      else if (k === 'textContent') node.textContent = v;
      else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
      else node.setAttribute(k, v);
    }
  }
  if (children) {
    if (typeof children === 'string') node.textContent = children;
    else if (Array.isArray(children)) children.forEach(c => { if (c) node.appendChild(c); });
    else node.appendChild(children);
  }
  return node;
}

function svgEl(tag, attrs) {
  const node = document.createElementNS('http://www.w3.org/2000/svg', tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
  return node;
}

function clearNode(node) {
  while (node.firstChild) node.removeChild(node.firstChild);
}

function fmt$(val) {
  if (val == null || isNaN(val)) return '$0.00';
  return '$' + val.toFixed(4);
}

function fmtTs(iso) {
  if (!iso) return '--:--';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch { return '--:--'; }
}

function setConnected(val) {
  connected = val;
  const ind = $('connIndicator');
  const label = ind.querySelector('.connection-label');
  if (val) {
    ind.classList.add('connected');
    label.textContent = 'Connected';
  } else {
    ind.classList.remove('connected');
    label.textContent = 'Offline';
  }
}

/* ================================================================
   CLOCK
   ================================================================ */
function tickClock() {
  $('headerTime').textContent = new Date().toLocaleTimeString([], {
    hour: '2-digit', minute: '2-digit', second: '2-digit',
  });
}
tickClock();
setInterval(tickClock, 1000);

/* ================================================================
   GAUGE SVG BUILDER
   ================================================================ */
function buildGauge(pct, color, size) {
  size = size || 100;
  const r = 40;
  const circ = 2 * Math.PI * r;
  const offset = circ - (circ * Math.max(0, Math.min(100, pct)) / 100);

  const container = el('div', { className: 'gauge-container' });
  if (size !== 100) {
    container.style.width = size + 'px';
    container.style.height = size + 'px';
  }

  const svg = svgEl('svg', { viewBox: '0 0 100 100', width: String(size), height: String(size) });
  const track = svgEl('circle', { cx: '50', cy: '50', r: String(r), class: 'gauge-track' });
  const fill = svgEl('circle', {
    cx: '50', cy: '50', r: String(r),
    class: 'gauge-fill',
    stroke: color,
    'stroke-dasharray': String(circ),
    'stroke-dashoffset': String(offset),
  });

  svg.appendChild(track);
  svg.appendChild(fill);
  container.appendChild(svg);

  // Set glow color via CSS custom property
  container.style.setProperty('--gauge-glow', color.replace('var(', '').replace(')', ''));

  const valWrap = el('div', { className: 'gauge-value' });
  const numEl = el('span', { className: 'gauge-number', textContent: Math.round(pct) });
  const labEl = el('span', { className: 'gauge-label-sm' });
  valWrap.appendChild(numEl);
  valWrap.appendChild(labEl);
  container.appendChild(valWrap);

  return { container, numEl, labEl };
}

/* ================================================================
   PANEL RENDERERS
   ================================================================ */

/* --- EXECUTION --- */
function renderExecution(state) {
  const body = $('execBody');
  const badges = $('execBadges');
  clearNode(body);
  clearNode(badges);

  const s = state && state.state ? state.state : null;
  if (!s || !s.current_wave) {
    body.appendChild(el('div', { className: 'empty-state' }, [
      el('div', { className: 'empty-icon empty-icon-exec', textContent: '\u2699\uFE0F' }),
      el('div', { className: 'empty-text' }, [
        document.createTextNode('No active execution. Run '),
        el('code', {}, '/juhbdi:execute'),
        document.createTextNode(' to start.'),
      ]),
    ]));
    return;
  }

  if (s.current_wave) {
    badges.appendChild(el('span', { className: 'badge badge-wave', textContent: 'Wave ' + s.current_wave }));
  }
  if (s.current_phase) {
    badges.appendChild(el('span', { className: 'badge badge-phase', textContent: s.current_phase }));
  }

  const tasks = s.tasks || [];
  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'done' || t.status === 'completed').length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  const track = el('div', { className: 'progress-track' });
  const fill = el('div', { className: 'progress-fill' });
  fill.style.width = pct + '%';
  track.appendChild(fill);
  body.appendChild(track);
  body.appendChild(el('div', { className: 'progress-label', textContent: done + '/' + total + ' tasks (' + pct + '%)' }));

  if (s.last_wave_result) {
    const lw = el('div', { className: 'exec-last-result' });
    lw.appendChild(el('div', { className: 'label', textContent: 'Last Wave Result' }));
    lw.appendChild(el('div', { className: 'value', textContent: s.last_wave_result }));
    body.appendChild(lw);
  }
}

/* --- TRUST & GOVERNANCE --- */
function renderTrust(memory, state) {
  const body = $('trustBody');
  clearNode(body);

  const score = (memory && memory.trust_score != null) ? memory.trust_score : 0;
  const tier = (memory && memory.trust_tier) ? memory.trust_tier : 'unknown';

  let tierName, tierClass;
  if (tier === 'unknown' || score === 0) { tierName = 'New Project'; tierClass = 'tier-new'; }
  else if (score <= 25) { tierName = 'Intern'; tierClass = 'tier-intern'; }
  else if (score <= 50) { tierName = 'Junior'; tierClass = 'tier-junior'; }
  else if (score <= 75) { tierName = 'Senior'; tierClass = 'tier-senior'; }
  else { tierName = 'Principal'; tierClass = 'tier-principal'; }

  let gaugeColor;
  if (tier === 'unknown' || score === 0) gaugeColor = 'var(--overlay0)';
  else if (score <= 25) gaugeColor = 'var(--overlay1)';
  else if (score <= 50) gaugeColor = 'var(--blue)';
  else if (score <= 75) gaugeColor = 'var(--green)';
  else gaugeColor = 'var(--mauve)';

  const top = el('div', { className: 'trust-top' });
  const gauge = buildGauge(score, gaugeColor, 100);
  gauge.labEl.textContent = 'trust';
  top.appendChild(gauge.container);

  const meta = el('div', { className: 'trust-meta' });
  meta.appendChild(el('span', { className: 'tier-badge ' + tierClass, textContent: tierName }));

  const compBar = el('div', { className: 'compliance-bar' });
  const compPct = (state && state.state && state.state.eu_compliance_pct != null) ? state.state.eu_compliance_pct : 0;
  const compLabel = el('div', { className: 'compliance-label' });
  compLabel.appendChild(el('span', {}, 'EU AI Act'));
  compLabel.appendChild(el('span', {}, compPct + '%'));
  compBar.appendChild(compLabel);
  const compTrack = el('div', { className: 'compliance-track' });
  const compFill = el('div', { className: 'compliance-fill' });
  compFill.style.width = compPct + '%';
  compTrack.appendChild(compFill);
  compBar.appendChild(compTrack);
  meta.appendChild(compBar);

  top.appendChild(meta);
  body.appendChild(top);

  const trail = (state && state.trail) || [];
  const govEntries = trail.filter(e => e && (e.event_type === 'governance' || e.event_type === 'decision')).slice(-3);
  if (govEntries.length > 0) {
    const govDiv = el('div', { className: 'gov-decisions' });
    for (const entry of govEntries) {
      const item = el('div', { className: 'gov-decision-item' });
      item.appendChild(el('div', { className: 'decision-time', textContent: fmtTs(entry.timestamp) }));
      item.appendChild(el('div', {}, entry.description || entry.event || 'Decision recorded'));
      govDiv.appendChild(item);
    }
    body.appendChild(govDiv);
  }
}

/* --- COST INTELLIGENCE --- */
function renderCost(cost) {
  const body = $('costBody');
  clearNode(body);

  if (!cost || (cost.total_spend === 0 && cost.opus_equivalent === 0)) {
    body.appendChild(el('div', { className: 'empty-state' }, [
      el('div', { className: 'empty-icon empty-icon-cost', textContent: '\uD83D\uDCB0' }),
      el('div', { className: 'empty-text' }, [
        document.createTextNode('Costs tracked after '),
        el('code', {}, '/juhbdi:execute'),
        document.createTextNode(' routes tasks.'),
      ]),
    ]));
    return;
  }

  const savPct = cost.savings_pct || 0;
  const hero = el('div', { className: 'cost-hero' });
  hero.appendChild(el('div', { className: 'cost-big-number', textContent: savPct + '%' }));
  body.appendChild(hero);
  body.appendChild(el('div', { className: 'cost-big-label', textContent: 'savings vs opus-only' }));

  const maxCost = Math.max(cost.total_spend || 0.0001, cost.opus_equivalent || 0.0001);
  const comp = el('div', { className: 'cost-comparison' });

  const g1 = el('div', { className: 'cost-bar-group' });
  const h1 = el('div', { className: 'cost-bar-header' });
  h1.appendChild(el('span', { className: 'cost-bar-name', textContent: 'Actual' }));
  h1.appendChild(el('span', { className: 'cost-bar-value', textContent: fmt$(cost.total_spend) }));
  g1.appendChild(h1);
  const t1 = el('div', { className: 'cost-bar-track' });
  const f1 = el('div', { className: 'cost-bar-fill actual' });
  f1.style.width = ((cost.total_spend / maxCost) * 100) + '%';
  t1.appendChild(f1);
  g1.appendChild(t1);
  comp.appendChild(g1);

  const g2 = el('div', { className: 'cost-bar-group' });
  const h2 = el('div', { className: 'cost-bar-header' });
  h2.appendChild(el('span', { className: 'cost-bar-name', textContent: 'Opus-only' }));
  h2.appendChild(el('span', { className: 'cost-bar-value', textContent: fmt$(cost.opus_equivalent) }));
  g2.appendChild(h2);
  const t2 = el('div', { className: 'cost-bar-track' });
  const f2 = el('div', { className: 'cost-bar-fill opus' });
  f2.style.width = ((cost.opus_equivalent / maxCost) * 100) + '%';
  t2.appendChild(f2);
  g2.appendChild(t2);
  comp.appendChild(g2);

  body.appendChild(comp);

  const dist = cost.model_distribution || {};
  const distKeys = Object.keys(dist);
  if (distKeys.length > 0) {
    const distDiv = el('div', { className: 'model-dist' });
    distDiv.appendChild(el('div', { className: 'model-dist-label', textContent: 'Model Distribution' }));

    const totalModels = distKeys.reduce((s, k) => s + dist[k], 0);
    const bar = el('div', { className: 'model-stacked-bar' });

    const modelOrder = ['haiku', 'sonnet', 'opus'];
    const sorted = distKeys.sort((a, b) => {
      const ia = modelOrder.findIndex(m => a.toLowerCase().includes(m));
      const ib = modelOrder.findIndex(m => b.toLowerCase().includes(m));
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
    });

    for (const model of sorted) {
      const pct = (dist[model] / totalModels) * 100;
      const seg = el('div', { className: 'segment' });
      seg.style.width = pct + '%';
      const lm = model.toLowerCase();
      if (lm.includes('haiku')) seg.classList.add('segment-haiku');
      else if (lm.includes('sonnet')) seg.classList.add('segment-sonnet');
      else if (lm.includes('opus')) seg.classList.add('segment-opus');
      else seg.classList.add('segment-unknown');
      bar.appendChild(seg);
    }
    distDiv.appendChild(bar);

    const legend = el('div', { className: 'model-legend' });
    for (const model of sorted) {
      const li = el('div', { className: 'legend-item' });
      const dot = el('div', { className: 'legend-dot' });
      const lm = model.toLowerCase();
      if (lm.includes('haiku')) dot.style.background = 'var(--teal)';
      else if (lm.includes('sonnet')) dot.style.background = 'var(--blue)';
      else if (lm.includes('opus')) dot.style.background = 'var(--mauve)';
      else dot.style.background = 'var(--surface1)';
      li.appendChild(dot);
      li.appendChild(el('span', {}, model + ' (' + dist[model] + ')'));
      legend.appendChild(li);
    }
    distDiv.appendChild(legend);
    body.appendChild(distDiv);
  }
}

/* --- CONTEXT HEALTH --- */
function renderContext(context) {
  const body = $('contextBody');
  clearNode(body);

  const pct = (context && context.remaining_pct != null) ? context.remaining_pct : 100;
  const level = (context && context.level) ? context.level : 'NORMAL';

  let color;
  if (pct > 45) color = 'var(--green)';
  else if (pct > 35) color = 'var(--yellow)';
  else if (pct > 28) color = 'var(--peach)';
  else color = 'var(--red)';

  const center = el('div', { className: 'context-center' });
  const gauge = buildGauge(pct, color, 110);
  gauge.labEl.textContent = 'remaining';

  if (level !== 'NORMAL') gauge.container.classList.add('pulse-warning');

  center.appendChild(gauge.container);

  const levelClass = 'level-' + level.toLowerCase();
  center.appendChild(el('div', { className: 'context-level ' + levelClass, textContent: level }));

  body.appendChild(center);
}

/* --- DECISION TRAIL --- */
function renderTrail(trail) {
  const body = $('trailBody');
  const countEl = $('trailCount');

  if (!trail || trail.length === 0) {
    if (body.children.length === 0 || body.querySelector('.trail-empty')) {
      clearNode(body);
      body.appendChild(el('div', { className: 'trail-empty', textContent: 'Awaiting first decision\u2026' }));
    }
    if (countEl) countEl.textContent = '';
    return;
  }

  if (trail.length === lastTrailCount) return;

  clearNode(body);
  lastTrailCount = trail.length;
  if (countEl) countEl.textContent = trail.length + ' entries';

  const typeColorMap = {
    command: 'type-command',
    decision: 'type-decision',
    routing: 'type-routing',
    execution: 'type-execution',
    error: 'type-error',
    governance: 'type-governance',
    verification: 'type-verification',
    recovery: 'type-recovery',
  };

  for (const entry of trail) {
    if (!entry) continue;
    const row = el('div', { className: 'trail-entry' });
    row.appendChild(el('span', { className: 'trail-ts', textContent: fmtTs(entry.timestamp) }));

    const evtType = (entry.event_type || 'event').toLowerCase();
    const badgeClass = typeColorMap[evtType] || 'type-default';
    row.appendChild(el('span', { className: 'type-badge ' + badgeClass, textContent: evtType }));

    const desc = entry.description || entry.event || entry.event_type || '';
    row.appendChild(el('span', { className: 'trail-desc', textContent: desc }));

    body.appendChild(row);
  }

  body.scrollTop = body.scrollHeight;
}

/* --- INTELLIGENCE MEMORY --- */
function renderMemory(memory) {
  const body = $('memoryBody');
  clearNode(body);

  const rCount = (memory && memory.reflexion_count) || 0;
  const tCount = (memory && memory.trace_count) || 0;
  const pCount = (memory && memory.principle_count) || 0;

  if (rCount === 0 && tCount === 0 && pCount === 0) {
    body.appendChild(el('div', { className: 'empty-state' }, [
      el('div', { className: 'empty-icon empty-icon-mem', textContent: '\uD83E\uDDE0' }),
      el('div', { className: 'empty-text', textContent: 'Memory builds as JuhBDI learns from your project' }),
    ]));
    return;
  }

  const row = el('div', { className: 'memory-stats-row' });
  function statBox(num, label) {
    const box = el('div', { className: 'memory-stat-box' });
    box.appendChild(el('div', { className: 'memory-stat-num', textContent: String(num) }));
    box.appendChild(el('div', { className: 'memory-stat-label', textContent: label }));
    return box;
  }
  row.appendChild(statBox(rCount, 'Reflexions'));
  row.appendChild(statBox(tCount, 'Traces'));
  row.appendChild(statBox(pCount, 'Principles'));
  body.appendChild(row);

  const recent = (memory && memory.recent_reflexions) || [];
  if (recent.length > 0) {
    const list = el('div', { className: 'reflexion-list' });
    for (const r of recent) {
      const item = el('div', { className: 'reflexion-item', onClick: function() {
        this.classList.toggle('expanded');
      }});
      item.appendChild(el('div', { className: 'reflexion-task', textContent: r.task || 'Unnamed task' }));
      item.appendChild(el('div', { className: 'reflexion-lesson', textContent: r.lesson || '' }));
      if (r.outcome) {
        const oc = r.outcome === 'success' ? 'outcome-success' :
                   r.outcome === 'failure' ? 'outcome-failure' : 'outcome-partial';
        item.appendChild(el('span', { className: 'reflexion-outcome ' + oc, textContent: r.outcome }));
      }
      list.appendChild(item);
    }
    body.appendChild(list);
  }
}

/* ================================================================
   MASTER UPDATE
   ================================================================ */
function updateDashboard(data) {
  if (!data) return;

  if (data.state !== undefined) {
    renderExecution(data.state);
    renderTrust(data.memory, { state: (data.state && data.state.state) || data.state, trail: data.trail || [] });
  }
  if (data.cost !== undefined) renderCost(data.cost);
  if (data.context !== undefined) renderContext(data.context);
  if (data.trail !== undefined) renderTrail(data.trail);
  if (data.memory !== undefined) {
    renderMemory(data.memory);
    if (data.state !== undefined) {
      renderTrust(data.memory, { state: (data.state && data.state.state) || data.state, trail: data.trail || [] });
    }
  }
}

/* ================================================================
   SSE CONNECTION
   ================================================================ */
let evtSource = null;

function connect() {
  if (evtSource) { try { evtSource.close(); } catch {} }
  evtSource = new EventSource('/api/events');
  evtSource.onmessage = function(e) {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'connected') { setConnected(true); return; }
      updateDashboard(data);
    } catch {}
  };
  evtSource.onerror = function() {
    setConnected(false);
    try { evtSource.close(); } catch {}
    setTimeout(connect, 3000);
  };
}

/* ================================================================
   INITIAL LOAD
   ================================================================ */
document.addEventListener('DOMContentLoaded', function() {
  renderExecution(null);
  renderTrust(null, null);
  renderCost(null);
  renderContext(null);
  renderTrail(null);
  renderMemory(null);

  Promise.all([
    fetch('/api/state').then(function(r) { return r.json(); }).catch(function() { return null; }),
    fetch('/api/trail').then(function(r) { return r.json(); }).catch(function() { return []; }),
    fetch('/api/cost').then(function(r) { return r.json(); }).catch(function() { return null; }),
    fetch('/api/memory').then(function(r) { return r.json(); }).catch(function() { return null; }),
    fetch('/api/context').then(function(r) { return r.json(); }).catch(function() { return null; }),
  ]).then(function(results) {
    updateDashboard({
      state: results[0],
      trail: results[1],
      cost: results[2],
      memory: results[3],
      context: results[4],
    });
  });

  connect();
});
</script>
