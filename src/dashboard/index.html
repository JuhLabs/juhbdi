/* --- EXECUTION --- */
function renderExecution(stateData) {
  var body = $('execBody');
  var badges = $('execBadges');
  clearNode(body);
  clearNode(badges);

  var s = stateData && stateData.state ? stateData.state : null;
  var roadmap = stateData && stateData.roadmap ? stateData.roadmap : null;
  var intentSpec = stateData && stateData.intentSpec ? stateData.intentSpec : null;

  // If actively executing with current_wave, show active execution view
  if (s && s.current_wave) {
    if (s.current_wave) {
      badges.appendChild(el('span', { className: 'badge badge-wave', textContent: 'Wave ' + s.current_wave }));
    }
    if (s.current_phase) {
      badges.appendChild(el('span', { className: 'badge badge-phase', textContent: s.current_phase }));
    }

    var tasks = s.tasks || [];
    var total = tasks.length;
    var done = tasks.filter(function(t) { return t.status === 'done' || t.status === 'completed'; }).length;
    var pct = total > 0 ? Math.round((done / total) * 100) : 0;

    var track = el('div', { className: 'progress-track' });
    var fill = el('div', { className: 'progress-fill' });
    fill.style.width = '0%';
    track.appendChild(fill);
    body.appendChild(track);
    body.appendChild(el('div', { className: 'progress-label', textContent: done + '/' + total + ' tasks (' + pct + '%)' }));

    // Animate progress bar
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { fill.style.width = pct + '%'; });
    });

    if (s.last_wave_result) {
      var lw = el('div', { className: 'exec-last-result' });
      lw.appendChild(el('div', { className: 'label', textContent: 'Last Wave Result' }));
      lw.appendChild(el('div', { className: 'value', textContent: s.last_wave_result }));
      body.appendChild(lw);
    }
    return;
  }

  // If we have roadmap data, show the roadmap overview
  if (roadmap && roadmap.waves && roadmap.waves.length > 0) {
    var waves = roadmap.waves;
    var totalTasks = 0;
    var totalWaves = waves.length;
    waves.forEach(function(w) { totalTasks += (w.tasks || []).length; });

    // Project badge
    var projectName = (s && s.project_name) || (intentSpec && intentSpec.project && intentSpec.project.name) || null;
    if (projectName) {
      var projBadge = el('div', { className: 'badge-project' });
      projBadge.appendChild(el('span', { className: 'badge-project-dot' }));
      projBadge.appendChild(document.createTextNode(projectName));
      badges.appendChild(projBadge);
    }

    // Stats row
    var statsRow = el('div', { className: 'exec-stats-row' });
    var stat1 = el('div', { className: 'exec-stat' });
    stat1.appendChild(el('div', { className: 'exec-stat-num', textContent: String(totalTasks) }));
    stat1.appendChild(el('div', { className: 'exec-stat-label', textContent: 'Tasks' }));
    statsRow.appendChild(stat1);

    var stat2 = el('div', { className: 'exec-stat' });
    stat2.appendChild(el('div', { className: 'exec-stat-num', textContent: String(totalWaves) }));
    stat2.appendChild(el('div', { className: 'exec-stat-label', textContent: 'Waves' }));
    statsRow.appendChild(stat2);

    // Count statuses
    var completedTasks = 0;
    var pendingTasks = 0;
    waves.forEach(function(w) {
      (w.tasks || []).forEach(function(t) {
        if (t.status === 'done' || t.status === 'completed') completedTasks++;
        else pendingTasks++;
      });
    });

    var stat3 = el('div', { className: 'exec-stat' });
    stat3.appendChild(el('div', { className: 'exec-stat-num', textContent: completedTasks > 0 ? String(completedTasks) : '0' }));
    stat3.appendChild(el('div', { className: 'exec-stat-label', textContent: 'Done' }));
    statsRow.appendChild(stat3);

    body.appendChild(statsRow);

    // Wave grid
    var waveGrid = el('div', { className: 'wave-grid' });
    waves.forEach(function(w, idx) {
      var wTasks = w.tasks || [];
      var wDone = wTasks.filter(function(t) { return t.status === 'done' || t.status === 'completed'; }).length;
      var wStatus = wDone === wTasks.length && wTasks.length > 0 ? 'wave-complete' : 'wave-pending';

      var block = el('div', { className: 'wave-block ' + wStatus });
      block.appendChild(el('div', { className: 'wave-block-id', textContent: w.id || ('W' + (idx + 1)) }));
      block.appendChild(el('div', { className: 'wave-block-count', textContent: String(wTasks.length) }));
      block.appendChild(el('div', { className: 'wave-block-label', textContent: wTasks.length === 1 ? 'task' : 'tasks' }));

      // Tooltip with task descriptions on hover
      var tooltipParts = [];
      wTasks.forEach(function(t) {
        var desc = t.description || t.id || 'task';
        var statusIcon = (t.status === 'done' || t.status === 'completed') ? '\u2713 ' : '\u25CB ';
        tooltipParts.push(statusIcon + desc.substring(0, 60));
      });
      if (tooltipParts.length > 0) block.title = tooltipParts.join('\n');

      waveGrid.appendChild(block);
    });
    body.appendChild(waveGrid);

    // Project info
    if (s && s.architecture) {
      var projInfo = el('div', { className: 'exec-project-name' });
      projInfo.appendChild(el('strong', {}, 'Architecture: '));
      projInfo.appendChild(document.createTextNode(s.architecture.substring(0, 120)));
      body.appendChild(projInfo);
    }

    return;
  }

  // True empty state — check if we have state but no roadmap vs completely fresh
  var emptyDiv = el('div', { className: 'empty-state' });
  var gearIcon = el('div', { className: 'empty-icon-gear' });
  emptyDiv.appendChild(gearIcon);
  if (s && !roadmap) {
    // Project initialized but no roadmap yet
    emptyDiv.appendChild(el('div', { className: 'empty-text' }, [
      document.createTextNode('No active roadmap. Run '),
      el('code', {}, '/juhbdi:plan'),
      document.createTextNode(' to create one.'),
    ]));
  } else {
    emptyDiv.appendChild(el('div', { className: 'empty-text' }, [
      document.createTextNode('No active execution. Run '),
      el('code', {}, '/juhbdi:init'),
      document.createTextNode(' to get started, or '),
      el('code', {}, '/juhbdi:execute'),
      document.createTextNode(' if already initialized.'),
    ]));
  }
  body.appendChild(emptyDiv);
}

/* --- TRUST & GOVERNANCE --- */
function renderTrust(memory, state) {
  var body = $('trustBody');
  clearNode(body);

  var score = (memory && memory.trust_score != null) ? memory.trust_score : 0;
  var tier = (memory && memory.trust_tier) ? memory.trust_tier : 'unknown';

  var tierName, tierClass;
  if (tier === 'unknown' || score === 0) { tierName = 'New Project'; tierClass = 'tier-new'; }
  else if (score <= 25) { tierName = 'Intern'; tierClass = 'tier-intern'; }
  else if (score <= 50) { tierName = 'Junior'; tierClass = 'tier-junior'; }
  else if (score <= 75) { tierName = 'Senior'; tierClass = 'tier-senior'; }
  else { tierName = 'Principal'; tierClass = 'tier-principal'; }

  var gaugeColors, glowColor;
  if (tier === 'unknown' || score === 0) {
    gaugeColors = ['#6c7086', '#7f849c'];
    glowColor = 'rgba(108, 112, 134, 0.15)';
  } else if (score <= 25) {
    gaugeColors = ['#7f849c', '#9399b2'];
    glowColor = 'rgba(127, 132, 156, 0.2)';
  } else if (score <= 50) {
    gaugeColors = ['#89b4fa', '#74c7ec'];
    glowColor = 'rgba(137, 180, 250, 0.2)';
  } else if (score <= 75) {
    gaugeColors = ['#a6e3a1', '#94e2d5'];
    glowColor = 'rgba(166, 227, 161, 0.2)';
  } else {
    gaugeColors = ['#cba6f7', '#f5c2e7'];
    glowColor = 'rgba(203, 166, 247, 0.25)';
  }

  var top = el('div', { className: 'trust-top' });
  var gauge = buildGauge(score, gaugeColors, 110, glowColor);
  gauge.labEl.textContent = 'TRUST';
  // Show dash when trust hasn't been established yet
  if (tier === 'unknown' && score === 0) {
    gauge.numEl.textContent = '\u2014';
    gauge.numEl.style.fontSize = '1.4rem';
    gauge.numEl.style.color = 'var(--overlay1)';
  }
  top.appendChild(gauge.container);

  var meta = el('div', { className: 'trust-meta' });
  meta.appendChild(el('span', { className: 'tier-badge ' + tierClass, textContent: tierName }));

  var compBar = el('div', { className: 'compliance-bar' });
  var compPct = (state && state.state && state.state.eu_compliance_pct != null) ? state.state.eu_compliance_pct : 0;
  var compLabel = el('div', { className: 'compliance-label' });
  compLabel.appendChild(el('span', {}, 'EU AI Act'));
  if (compPct > 0) {
    compLabel.appendChild(el('span', {}, compPct + '%'));
  } else {
    var pendingSpan = el('span', {});
    pendingSpan.style.fontStyle = 'italic';
    pendingSpan.style.opacity = '0.6';
    pendingSpan.textContent = 'pending';
    compLabel.appendChild(pendingSpan);
  }
  compBar.appendChild(compLabel);
  var compTrack = el('div', { className: 'compliance-track' });
  var compFill = el('div', { className: 'compliance-fill' });
  compFill.style.width = '0%';
  compTrack.appendChild(compFill);
  compBar.appendChild(compTrack);
  meta.appendChild(compBar);

  // Animate compliance bar
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { compFill.style.width = compPct + '%'; });
  });

  top.appendChild(meta);
  body.appendChild(top);

  var trail = (state && state.trail) || [];
  var govEntries = trail.filter(function(e) {
    return e && (e.event_type === 'governance' || e.event_type === 'decision');
  }).slice(-3);

  if (govEntries.length > 0) {
    var govDiv = el('div', { className: 'gov-decisions' });
    for (var i = 0; i < govEntries.length; i++) {
      var entry = govEntries[i];
      var item = el('div', { className: 'gov-decision-item' });
      item.appendChild(el('div', { className: 'decision-time', textContent: fmtTs(entry.timestamp) }));
      item.appendChild(el('div', {}, entry.description || entry.event || 'Decision recorded'));
      govDiv.appendChild(item);
    }
    body.appendChild(govDiv);
  } else if (tier === 'unknown' || score === 0) {
    // Informative hint when no governance data yet
    var trustHint = el('div', {
      className: 'gov-decision-item',
      style: 'border-left-color: var(--overlay0); opacity: 0.7; font-style: italic;'
    });
    trustHint.textContent = 'Trust score builds after task execution. Run /juhbdi:execute to begin.';
    body.appendChild(trustHint);
  }
}

/* --- COST INTELLIGENCE --- */
function renderCost(cost) {
  var body = $('costBody');
  clearNode(body);

  var dist = (cost && cost.model_distribution) ? cost.model_distribution : {};
  var distKeys = Object.keys(dist);
  var totalRouted = distKeys.reduce(function(s, k) { return s + dist[k]; }, 0);
  var hasSpend = cost && (cost.total_spend > 0 || cost.opus_equivalent > 0);
  var hasDist = distKeys.length > 0 && totalRouted > 0;

  // Only show empty if BOTH spend=0 AND no distribution data
  if (!hasSpend && !hasDist) {
    var emptyDiv = el('div', { className: 'empty-state' });
    var barsIcon = el('div', { className: 'empty-icon-bars' });
    for (var b = 0; b < 5; b++) barsIcon.appendChild(el('div', { className: 'bar-anim' }));
    emptyDiv.appendChild(barsIcon);
    emptyDiv.appendChild(el('div', { className: 'empty-text' }, [
      document.createTextNode('No routing data yet. Costs are tracked when '),
      el('code', {}, '/juhbdi:execute'),
      document.createTextNode(' routes tasks to models.'),
    ]));
    body.appendChild(emptyDiv);
    return;
  }

  // If we have spend data, show the savings hero
  if (hasSpend) {
    var savPct = cost.savings_pct || 0;
    var hero = el('div', { className: 'cost-hero' });
    hero.appendChild(el('div', { className: 'cost-big-number', textContent: savPct + '%' }));
    body.appendChild(hero);
    body.appendChild(el('div', { className: 'cost-big-label', textContent: 'Savings vs Opus-Only' }));

    var maxCost = Math.max(cost.total_spend || 0.0001, cost.opus_equivalent || 0.0001);
    var comp = el('div', { className: 'cost-comparison' });

    var g1 = el('div', { className: 'cost-bar-group' });
    var h1 = el('div', { className: 'cost-bar-header' });
    h1.appendChild(el('span', { className: 'cost-bar-name', textContent: 'Actual' }));
    h1.appendChild(el('span', { className: 'cost-bar-value', textContent: fmt$(cost.total_spend) }));
    g1.appendChild(h1);
    var t1 = el('div', { className: 'cost-bar-track' });
    var f1 = el('div', { className: 'cost-bar-fill actual' });
    f1.style.width = '0%';
    t1.appendChild(f1);
    g1.appendChild(t1);
    comp.appendChild(g1);

    var g2 = el('div', { className: 'cost-bar-group' });
    var h2 = el('div', { className: 'cost-bar-header' });
    h2.appendChild(el('span', { className: 'cost-bar-name', textContent: 'Opus-Only' }));
    h2.appendChild(el('span', { className: 'cost-bar-value', textContent: fmt$(cost.opus_equivalent) }));
    g2.appendChild(h2);
    var t2 = el('div', { className: 'cost-bar-track' });
    var f2 = el('div', { className: 'cost-bar-fill opus' });
    f2.style.width = '0%';
    t2.appendChild(f2);
    g2.appendChild(t2);
    comp.appendChild(g2);

    body.appendChild(comp);

    // Animate bars
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        f1.style.width = ((cost.total_spend / maxCost) * 100) + '%';
        f2.style.width = ((cost.opus_equivalent / maxCost) * 100) + '%';
      });
    });
  }

  // Show model distribution if we have it (even with 0 spend)
  if (hasDist) {
    // Routing stat
    var routingStat = el('div', { className: 'cost-routing-stat' });
    routingStat.appendChild(el('div', { className: 'cost-routing-num', textContent: String(totalRouted) }));
    var routingLabelDiv = el('div');
    routingLabelDiv.appendChild(el('div', { className: 'cost-routing-label', textContent: 'Routing' }));
    routingLabelDiv.appendChild(el('div', { className: 'cost-routing-label', textContent: totalRouted === 1 ? 'Decision' : 'Decisions' }));
    routingStat.appendChild(routingLabelDiv);
    body.appendChild(routingStat);

    // Distribution bar
    var distDiv = el('div', { className: 'model-dist' });
    distDiv.appendChild(el('div', { className: 'model-dist-label', textContent: 'Model Distribution' }));

    var bar = el('div', { className: 'model-stacked-bar' });

    var modelOrder = ['haiku', 'sonnet', 'opus'];
    var sorted = distKeys.sort(function(a, b) {
      var ia = modelOrder.findIndex(function(m) { return a.toLowerCase().indexOf(m) !== -1; });
      var ib = modelOrder.findIndex(function(m) { return b.toLowerCase().indexOf(m) !== -1; });
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
    });

    for (var si = 0; si < sorted.length; si++) {
      var model = sorted[si];
      var segPct = (dist[model] / totalRouted) * 100;
      var seg = el('div', { className: 'segment' });
      seg.style.width = segPct + '%';
      var lm = model.toLowerCase();
      if (lm.indexOf('haiku') !== -1) seg.classList.add('segment-haiku');
      else if (lm.indexOf('sonnet') !== -1) seg.classList.add('segment-sonnet');
      else if (lm.indexOf('opus') !== -1) seg.classList.add('segment-opus');
      else seg.classList.add('segment-unknown');
      bar.appendChild(seg);
    }
    distDiv.appendChild(bar);

    var legend = el('div', { className: 'model-legend' });
    for (var li = 0; li < sorted.length; li++) {
      var lmodel = sorted[li];
      var legendItem = el('div', { className: 'legend-item' });
      var dot = el('div', { className: 'legend-dot' });
      var llm = lmodel.toLowerCase();
      if (llm.indexOf('haiku') !== -1) dot.style.background = 'linear-gradient(135deg, #94e2d5, #7dd6c6)';
      else if (llm.indexOf('sonnet') !== -1) dot.style.background = 'linear-gradient(135deg, #89b4fa, #a0c8fc)';
      else if (llm.indexOf('opus') !== -1) dot.style.background = 'linear-gradient(135deg, #cba6f7, #d6b8fa)';
      else dot.style.background = 'linear-gradient(135deg, #45475a, #585b70)';
      legendItem.appendChild(dot);
      legendItem.appendChild(el('span', {}, lmodel + ' (' + dist[lmodel] + ')'));
      legend.appendChild(legendItem);
    }
    distDiv.appendChild(legend);
    body.appendChild(distDiv);
  }
}

/* --- SESSIONS & CONTEXT --- */
var cachedSessions = [];
var sessionFreshnessInterval = null;

function getIdeSlug(platform) {
  if (!platform || platform === 'unknown') return 'default';
  var p = platform.toLowerCase().replace(/[\s_]+/g, '-');
  var knownSlugs = ['claude-code', 'cursor', 'windsurf', 'kiro', 'copilot', 'cline', 'roo-code', 'kilo-code'];
  for (var i = 0; i < knownSlugs.length; i++) {
    if (p.indexOf(knownSlugs[i]) !== -1) return knownSlugs[i];
  }
  if (p.indexOf('github') !== -1) return 'copilot';
  return 'default';
}

function getIdeDisplayName(platform) {
  if (!platform || platform === 'unknown') return 'Session';
  var slug = getIdeSlug(platform);
  var names = {
    'claude-code': 'Claude Code',
    'cursor': 'Cursor',
    'windsurf': 'Windsurf',
    'kiro': 'Kiro',
    'copilot': 'Copilot',
    'cline': 'Cline',
    'roo-code': 'Roo Code',
    'kilo-code': 'Kilo Code',
    'default': 'Session'
  };
  return names[slug] || platform;
}

function getProgressColorClass(level) {
  if (!level) return 'sp-green';
  var l = level.toUpperCase();
  if (l === 'NORMAL') return 'sp-green';
  if (l === 'WARNING') return 'sp-yellow';
  if (l === 'URGENT') return 'sp-orange';
  return 'sp-red';
}

function truncateProjectPath(dir) {
  if (!dir || dir === 'unknown') return '';
  var parts = dir.replace(/\\/g, '/').split('/').filter(Boolean);
  if (parts.length <= 2) return parts.join('/');
  return parts.slice(-2).join('/');
}

function formatTimeAgo(isoStr) {
  if (!isoStr) return '';
  try {
    var diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
    if (diff < 0) diff = 0;
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  } catch (e) { return ''; }
}

function getWorstLevel(sessions) {
  var order = ['NORMAL', 'WARNING', 'URGENT', 'CRITICAL', 'EMERGENCY'];
  var worst = 0;
  for (var i = 0; i < sessions.length; i++) {
    var lvl = (sessions[i].level || 'NORMAL').toUpperCase();
    var idx = order.indexOf(lvl);
    if (idx > worst) worst = idx;
  }
  return order[worst];
}

function updateHeaderSessionIndicator(allSessions) {
  var dotEl = $('sessionIndicatorDot');
  var labelEl = $('sessionIndicatorLabel');
  if (!dotEl || !labelEl) return;

  if (!allSessions || allSessions.length === 0) {
    dotEl.className = 'session-indicator-dot si-off';
    labelEl.textContent = 'No sessions';
    return;
  }

  var activeSess = allSessions.filter(function(s) { return !s.stale; });
  var worst = getWorstLevel(activeSess.length > 0 ? activeSess : allSessions);
  var dotClass = 'si-green';
  if (worst === 'WARNING') dotClass = 'si-yellow';
  else if (worst === 'URGENT' || worst === 'CRITICAL' || worst === 'EMERGENCY') dotClass = 'si-red';
  if (activeSess.length === 0) dotClass = 'si-off';

  dotEl.className = 'session-indicator-dot ' + dotClass;
  var count = activeSess.length;
  labelEl.textContent = count > 0
    ? count + ' active session' + (count > 1 ? 's' : '')
    : allSessions.length + ' stale';
}

function buildSessionCard(session) {
  var ideSlug = getIdeSlug(session.ide_platform);

  var card = el('div', { className: 'session-card ide-' + ideSlug });
  if (session.stale) card.classList.add('session-stale');

  // Top row: IDE badge + level badge
  var top = el('div', { className: 'session-card-top' });
  var ideBadge = el('span', {
    className: 'ide-badge ide-badge-' + ideSlug,
    textContent: getIdeDisplayName(session.ide_platform)
  });
  top.appendChild(ideBadge);

  var level = (session.level || 'NORMAL').toUpperCase();
  var levelBadge = el('span', {
    className: 'session-level-badge session-level-' + level,
    textContent: level
  });
  top.appendChild(levelBadge);
  card.appendChild(top);

  // Mini progress bar
  var pct = session.remaining_pct != null ? session.remaining_pct : 100;
  var trackDiv = el('div', { className: 'session-progress-track' });
  var fillDiv = el('div', { className: 'session-progress-fill ' + getProgressColorClass(session.level) });
  trackDiv.appendChild(fillDiv);
  card.appendChild(trackDiv);

  // Animate progress bar
  requestAnimationFrame(function() {
    requestAnimationFrame(function() { fillDiv.style.width = Math.max(0, Math.min(100, pct)) + '%'; });
  });

  // Bottom row: percentage + meta
  var bottom = el('div', { className: 'session-card-bottom' });
  var pctEl = el('span', { className: 'session-pct', textContent: Math.round(pct) + '%' });
  bottom.appendChild(pctEl);

  var meta = el('div', { className: 'session-meta' });

  // Project path (truncated)
  var projPath = truncateProjectPath(session.project_dir);
  if (projPath) {
    meta.appendChild(el('span', { className: 'session-project-path', textContent: projPath }));
  } else {
    var noProj = el('span', { className: 'session-project-path' });
    noProj.style.fontStyle = 'italic';
    noProj.style.opacity = '0.6';
    noProj.textContent = 'No project info';
    meta.appendChild(noProj);
  }

  // Freshness
  var freshnessEl;
  if (session.stale) {
    freshnessEl = el('span', { className: 'session-freshness stale-label', textContent: 'stale' });
  } else {
    freshnessEl = el('span', {
      className: 'session-freshness',
      textContent: formatTimeAgo(session.timestamp)
    });
    freshnessEl.setAttribute('data-ts', session.timestamp || '');
  }
  meta.appendChild(freshnessEl);

  // Session ID (first 8 chars)
  var sid = session.session_id || '';
  if (sid) {
    meta.appendChild(el('span', { className: 'session-id', textContent: sid.substring(0, 8) }));
  }

  bottom.appendChild(meta);
  card.appendChild(bottom);

  return card;
}

function buildFolderSvg() {
  var svg = svgEl('svg', { viewBox: '0 0 16 16', fill: 'none', width: '14', height: '14' });
  var path = svgEl('path', {
    d: 'M2 3a1 1 0 011-1h3.586a1 1 0 01.707.293L8.414 3.414A1 1 0 009.12 3.707H13a1 1 0 011 1V12a1 1 0 01-1 1H3a1 1 0 01-1-1V3z',
    stroke: 'currentColor',
    'stroke-width': '1.2',
    fill: 'none'
  });
  svg.appendChild(path);
  return svg;
}

function renderSessions(sessionsData) {
  var body = $('contextBody');
  var badge = $('sessionCountBadge');
  clearNode(body);

  // Flatten all sessions from the grouped data
  var allSessions = [];
  var groups = sessionsData || [];
  for (var g = 0; g < groups.length; g++) {
    var sessions = groups[g].sessions || [];
    for (var s = 0; s < sessions.length; s++) {
      allSessions.push(sessions[s]);
    }
  }

  // Separate active vs stale
  var activeSessions = allSessions.filter(function(s) { return !s.stale; });
  var staleSessions = allSessions.filter(function(s) { return s.stale; });
  var MAX_STALE_SHOWN = 3;
  var visibleStale = staleSessions.slice(0, MAX_STALE_SHOWN);
  var hiddenStaleCount = staleSessions.length - visibleStale.length;

  // Store for freshness updates (only visible ones)
  cachedSessions = activeSessions.concat(visibleStale);

  // Update header indicator
  updateHeaderSessionIndicator(allSessions);

  // Update header badge — count active only
  if (badge) {
    if (activeSessions.length > 0) {
      badge.textContent = activeSessions.length + ' active';
      badge.style.display = '';
    } else if (staleSessions.length > 0) {
      badge.textContent = staleSessions.length + ' stale';
      badge.style.display = '';
      badge.style.borderColor = 'rgba(108, 112, 134, 0.3)';
      badge.style.color = 'var(--overlay1)';
    } else {
      badge.style.display = 'none';
    }
  }

  // Empty state
  if (allSessions.length === 0) {
    var emptyDiv = el('div', { className: 'empty-state' });

    var radarIcon = el('div', { className: 'session-radar-icon' });
    radarIcon.appendChild(el('div', { className: 'radar-center' }));
    radarIcon.appendChild(el('div', { className: 'radar-ring' }));
    radarIcon.appendChild(el('div', { className: 'radar-ring' }));
    radarIcon.appendChild(el('div', { className: 'radar-ring' }));
    radarIcon.appendChild(el('div', { className: 'radar-ring' }));

    emptyDiv.appendChild(radarIcon);
    emptyDiv.appendChild(el('div', { className: 'session-empty-title', textContent: 'No active sessions detected' }));
    emptyDiv.appendChild(el('div', { className: 'session-empty-desc', textContent: 'Sessions appear automatically when JuhBDI runs in any supported IDE. Context levels update in real time.' }));
    body.appendChild(emptyDiv);
    return;
  }

  // Create scrollable container
  var scrollContainer = el('div', { className: 'sessions-scroll' });

  // Render by project groups
  if (groups.length === 1) {
    // Single project — show active first, then limited stale
    for (var i = 0; i < activeSessions.length; i++) {
      scrollContainer.appendChild(buildSessionCard(activeSessions[i]));
    }
    for (var j = 0; j < visibleStale.length; j++) {
      scrollContainer.appendChild(buildSessionCard(visibleStale[j]));
    }
  } else {
    // Multiple projects — group with headers
    for (var gi = 0; gi < groups.length; gi++) {
      var group = groups[gi];
      var groupSessions = group.sessions || [];
      if (groupSessions.length === 0) continue;

      var groupActive = groupSessions.filter(function(s) { return !s.stale; });
      var groupStale = groupSessions.filter(function(s) { return s.stale; });
      var groupVisible = groupActive.concat(groupStale.slice(0, MAX_STALE_SHOWN));

      if (groupVisible.length === 0) continue;

      var groupDiv = el('div', { className: 'session-project-group' });
      var header = el('div', { className: 'session-project-header' });
      header.appendChild(buildFolderSvg());
      var groupPath = truncateProjectPath(group.project_dir);
      if (groupPath) {
        header.appendChild(document.createTextNode(groupPath));
      } else {
        var noGroupPath = el('span', {});
        noGroupPath.style.fontStyle = 'italic';
        noGroupPath.style.opacity = '0.6';
        noGroupPath.textContent = 'Unknown project';
        header.appendChild(noGroupPath);
      }
      groupDiv.appendChild(header);

      for (var si = 0; si < groupVisible.length; si++) {
        groupDiv.appendChild(buildSessionCard(groupVisible[si]));
      }

      scrollContainer.appendChild(groupDiv);
    }
  }

  body.appendChild(scrollContainer);

  // Show hidden stale count
  if (hiddenStaleCount > 0) {
    body.appendChild(el('div', {
      className: 'sessions-hidden-note',
      textContent: '+ ' + hiddenStaleCount + ' older session' + (hiddenStaleCount > 1 ? 's' : '') + ' not shown'
    }));
  }
}

// Auto-update freshness timestamps every second
function startFreshnessTimer() {
  if (sessionFreshnessInterval) return;
  sessionFreshnessInterval = setInterval(function() {
    var els = document.querySelectorAll('.session-freshness[data-ts]');
    for (var i = 0; i < els.length; i++) {
      var ts = els[i].getAttribute('data-ts');
      if (ts) els[i].textContent = formatTimeAgo(ts);
    }
  }, 1000);
}
startFreshnessTimer();

/* --- DECISION TRAIL --- */
function renderTrail(trail) {
  var body = $('trailBody');
  var countEl = $('trailCount');

  if (!trail || trail.length === 0) {
    if (body.children.length === 0 || body.querySelector('.trail-empty')) {
      clearNode(body);
      body.appendChild(el('div', { className: 'trail-empty', textContent: 'No trail entries yet. Decisions are recorded as commands execute.' }));
    }
    if (countEl) countEl.textContent = '';
    return;
  }

  if (trail.length === lastTrailCount) return;

  clearNode(body);
  lastTrailCount = trail.length;
  if (countEl) countEl.textContent = trail.length + ' entries';

  var typeColorMap = {
    command: 'type-command',
    decision: 'type-decision',
    routing: 'type-routing',
    execution: 'type-execution',
    error: 'type-error',
    governance: 'type-governance',
    verification: 'type-verification',
    recovery: 'type-recovery',
  };

  for (var i = 0; i < trail.length; i++) {
    var entry = trail[i];
    if (!entry) continue;
    var row = el('div', { className: 'trail-entry' });
    row.style.animation = 'fadeInUp 0.3s ease ' + (i * 0.03) + 's both';
    row.appendChild(el('span', { className: 'trail-ts', textContent: fmtTs(entry.timestamp) }));

    var evtType = (entry.event_type || 'event').toLowerCase();
    var badgeClass = typeColorMap[evtType] || 'type-default';
    row.appendChild(el('span', { className: 'type-badge ' + badgeClass, textContent: evtType }));

    var desc = entry.description || entry.event || entry.event_type || '';
    row.appendChild(el('span', { className: 'trail-desc', textContent: desc }));

    body.appendChild(row);
  }

  // Blinking cursor at bottom
  body.appendChild(el('div', { className: 'trail-cursor' }));

  body.scrollTop = body.scrollHeight;
}

/* --- INTELLIGENCE MEMORY --- */
function renderMemory(memory) {
  var body = $('memoryBody');
  clearNode(body);

  var rCount = (memory && memory.reflexion_count) || 0;
  var tCount = (memory && memory.trace_count) || 0;
  var pCount = (memory && memory.principle_count) || 0;

  if (rCount === 0 && tCount === 0 && pCount === 0) {
    var container = el('div', { className: 'memory-empty-container' });

    // Animated neural icon
    var neuralIcon = el('div', { className: 'memory-neural-icon' });
    neuralIcon.appendChild(el('div', { className: 'neural-core' }));
    neuralIcon.appendChild(el('div', { className: 'neural-ring' }));
    neuralIcon.appendChild(el('div', { className: 'neural-ring' }));
    neuralIcon.appendChild(el('div', { className: 'neural-ring' }));
    neuralIcon.appendChild(el('div', { className: 'neural-ring' }));

    var particles = el('div', { className: 'neural-particles' });
    for (var p = 0; p < 4; p++) particles.appendChild(el('div', { className: 'neural-particle' }));
    neuralIcon.appendChild(particles);

    container.appendChild(neuralIcon);
    container.appendChild(el('div', { className: 'memory-empty-title', textContent: 'Neural Memory Idle' }));
    container.appendChild(el('div', { className: 'memory-empty-desc', textContent: 'Memory builds as JuhBDI learns from reflexions, traces, and principles during execution.' }));
    body.appendChild(container);
    return;
  }

  var row = el('div', { className: 'memory-stats-row' });
  function statBox(num, label) {
    var box = el('div', { className: 'memory-stat-box' });
    box.appendChild(el('div', { className: 'memory-stat-num', textContent: String(num) }));
    box.appendChild(el('div', { className: 'memory-stat-label', textContent: label }));
    return box;
  }
  row.appendChild(statBox(rCount, 'Reflexions'));
  row.appendChild(statBox(tCount, 'Traces'));
  row.appendChild(statBox(pCount, 'Principles'));
  body.appendChild(row);

  var recent = (memory && memory.recent_reflexions) || [];
  if (recent.length > 0) {
    var list = el('div', { className: 'reflexion-list' });
    for (var ri = 0; ri < recent.length; ri++) {
      var r = recent[ri];
      var item = el('div', { className: 'reflexion-item', onClick: function() {
        this.classList.toggle('expanded');
      }});
      item.appendChild(el('div', { className: 'reflexion-task', textContent: r.task || 'Unnamed task' }));
      item.appendChild(el('div', { className: 'reflexion-lesson', textContent: r.lesson || '' }));
      if (r.outcome) {
        var oc = r.outcome === 'success' ? 'outcome-success' :
                 r.outcome === 'failure' ? 'outcome-failure' : 'outcome-partial';
        item.appendChild(el('span', { className: 'reflexion-outcome ' + oc, textContent: r.outcome }));
      }
      list.appendChild(item);
    }
    body.appendChild(list);
  }
}

/* ================================================================
   MASTER UPDATE
   ================================================================ */
function updateDashboard(data) {
  if (!data) return;

  // Cache all data for cross-panel references
  if (data.state !== undefined) cachedState = data.state;
  if (data.memory !== undefined) cachedMemory = data.memory;
  if (data.trail !== undefined) cachedTrail = data.trail;

  if (data.state !== undefined) {
    renderExecution(data.state);
    var mem = data.memory || cachedMemory;
    var trailData = data.trail || cachedTrail || [];
    renderTrust(mem, { state: (data.state && data.state.state) || data.state, trail: trailData });
  }
  if (data.cost !== undefined) renderCost(data.cost);
  if (data.sessions !== undefined) {
    renderSessions(data.sessions);
  } else if (data.context !== undefined) {
    // Legacy fallback: wrap single context into sessions format
    var ctx = data.context;
    if (ctx && ctx.remaining_pct != null) {
      renderSessions([{
        project_dir: ctx.project_dir || '',
        sessions: [{
          session_id: ctx.session_id || 'legacy',
          project_dir: ctx.project_dir || '',
          ide_platform: ctx.ide_platform || 'claude-code',
          remaining_pct: ctx.remaining_pct,
          usable_pct: ctx.usable_pct != null ? ctx.usable_pct : ctx.remaining_pct,
          level: ctx.level || 'NORMAL',
          timestamp: ctx.timestamp || new Date().toISOString(),
          stale: false
        }]
      }]);
    } else {
      renderSessions([]);
    }
  }
  if (data.trail !== undefined) renderTrail(data.trail);
  if (data.memory !== undefined) {
    renderMemory(data.memory);
    // Re-render trust with updated memory
    var st = data.state || cachedState;
    var trailForTrust = data.trail || cachedTrail || [];
    renderTrust(data.memory, { state: (st && st.state) || st, trail: trailForTrust });
  }
}

/* ================================================================
   SSE CONNECTION
   ================================================================ */
var evtSource = null;

function connect() {
  if (evtSource) { try { evtSource.close(); } catch(e) {} }
  evtSource = new EventSource('/api/events');
  evtSource.onmessage = function(e) {
    try {
      var data = JSON.parse(e.data);
      if (data.type === 'connected') { setConnected(true); return; }
      updateDashboard(data);
    } catch(err) {}
  };
  evtSource.onerror = function() {
    setConnected(false);
    try { evtSource.close(); } catch(e) {}
    setTimeout(connect, 3000);
  };
}

/* ================================================================
   INITIAL LOAD
   ================================================================ */
document.addEventListener('DOMContentLoaded', function() {
  renderExecution(null);
  renderTrust(null, null);
  renderCost(null);
  renderSessions([]);
  renderTrail(null);
  renderMemory(null);

  Promise.all([
    fetch('/api/state').then(function(r) { return r.json(); }).catch(function() { return null; }),
    fetch('/api/trail').then(function(r) { return r.json(); }).catch(function() { return []; }),
    fetch('/api/cost').then(function(r) { return r.json(); }).catch(function() { return null; }),
    fetch('/api/memory').then(function(r) { return r.json(); }).catch(function() { return null; }),
    fetch('/api/sessions').then(function(r) { return r.json(); }).catch(function() { return []; }),
    fetch('/api/context').then(function(r) { return r.json(); }).catch(function() { return null; }),
  ]).then(function(results) {
    var sessionsData = results[4];
    var contextData = results[5];

    updateDashboard({
      state: results[0],
      trail: results[1],
      cost: results[2],
      memory: results[3],
      sessions: (sessionsData && sessionsData.length > 0) ? sessionsData : undefined,
      context: (sessionsData && sessionsData.length > 0) ? undefined : contextData,
    });
  });

  connect();

  // ── Transmission Lines ─────────────────────────────────────
  setTimeout(function() { drawTransmissionLines(); }, 300);
  window.addEventListener('resize', function() {
    clearTimeout(window._txDebounce);
    window._txDebounce = setTimeout(function() { drawTransmissionLines(); }, 100);
  });
});

function drawTransmissionLines() {
  var hub = document.querySelector('.command-hub');
  var nexus = document.querySelector('.robot-nexus');
  var svg = document.getElementById('txSvg');
  var linesG = document.getElementById('txLines');
  if (!hub || !nexus || !svg || !linesG) return;

  var hubRect = hub.getBoundingClientRect();
  var nexusRect = nexus.getBoundingClientRect();
  svg.setAttribute('viewBox', '0 0 ' + hubRect.width + ' ' + hubRect.height);

  // Robot center in hub-relative coordinates
  var cx = (nexusRect.left + nexusRect.width / 2) - hubRect.left;
  var cy = (nexusRect.top + nexusRect.height / 2) - hubRect.top;

  var panels = [
    { id: 'panelExec',    cls: 'exec',    dur: '2.8s' },
    { id: 'panelTrust',   cls: 'trust',   dur: '3.4s' },
    { id: 'panelCost',    cls: 'cost',    dur: '3.0s' },
    { id: 'panelContext',  cls: 'context', dur: '3.6s' },
  ];

  // Clear existing
  while (linesG.firstChild) linesG.removeChild(linesG.firstChild);

  var svgNS = 'http://www.w3.org/2000/svg';
  panels.forEach(function(p, idx) {
    var el = document.getElementById(p.id);
    if (!el) return;
    var r = el.getBoundingClientRect();

    // Panel bounds in hub-relative coords
    var pLeft = r.left - hubRect.left;
    var pRight = pLeft + r.width;
    var pTop = r.top - hubRect.top;
    var pBottom = pTop + r.height;
    var pCx = (pLeft + pRight) / 2;
    var pCy = (pTop + pBottom) / 2;

    // Connect from inner corner of panel (corner closest to robot center)
    var ex = cx < pCx ? pLeft + 30 : pRight - 30;
    var ey = cy < pCy ? pTop + 20 : pBottom - 20;

    // Start point: offset from robot center toward panel
    var dx = ex - cx, dy = ey - cy;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1) return;
    var nx = dx / dist, ny = dy / dist;
    var sx = cx + nx * 50;
    var sy = cy + ny * 50;

    // Curve control point — offset perpendicular to the line for a graceful arc
    var mx = (sx + ex) / 2, my = (sy + ey) / 2;
    var curveMag = dist * 0.15;
    var cpx = mx + ny * curveMag, cpy = my - nx * curveMag;

    var pathD = 'M ' + sx + ' ' + sy + ' Q ' + cpx + ' ' + cpy + ' ' + ex + ' ' + ey;
    var pathId = 'txPath_' + p.cls;

    // Draw the line path
    var path = document.createElementNS(svgNS, 'path');
    path.id = pathId;
    path.setAttribute('class', 'tx-line tx-line-' + p.cls);
    path.setAttribute('d', pathD);
    linesG.appendChild(path);

    // Animated dot traveling along the path
    var circle = document.createElementNS(svgNS, 'circle');
    circle.setAttribute('class', 'tx-dot tx-dot-' + p.cls);
    circle.setAttribute('r', '4');
    var motion = document.createElementNS(svgNS, 'animateMotion');
    motion.setAttribute('dur', p.dur);
    motion.setAttribute('repeatCount', 'indefinite');
    motion.setAttribute('keyPoints', '0;1;0');
    motion.setAttribute('keyTimes', '0;0.5;1');
    motion.setAttribute('calcMode', 'spline');
    motion.setAttribute('keySplines', '0.4 0 0.6 1;0.4 0 0.6 1');
    var mpath = document.createElementNS(svgNS, 'mpath');
    mpath.setAttribute('href', '#' + pathId);
    motion.appendChild(mpath);
    circle.appendChild(motion);
    linesG.appendChild(circle);
  });
}
</script>
