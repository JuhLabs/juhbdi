<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JuhBDI — Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   DESIGN TOKENS — Catppuccin Mocha + JuhBDI accents
   ================================================================ */
@property --border-angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}

:root {
  --base: #1e1e2e;
  --mantle: #181825;
  --crust: #11111b;
  --surface0: #313244;
  --surface1: #45475a;
  --surface2: #585b70;
  --text: #cdd6f4;
  --subtext0: #a6adc8;
  --subtext1: #bac2de;
  --lavender: #b4befe;
  --blue: #89b4fa;
  --sapphire: #74c7ec;
  --teal: #94e2d5;
  --green: #a6e3a1;
  --yellow: #f9e2af;
  --peach: #fab387;
  --red: #f38ba8;
  --mauve: #cba6f7;
  --pink: #f5c2e7;
  --flamingo: #f2cdcd;
  --rosewater: #f5e0dc;
  --overlay0: #6c7086;
  --overlay1: #7f849c;
  --overlay2: #9399b2;

  --font-display: 'Outfit', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', 'Fira Code', monospace;

  --accent-exec: var(--lavender);
  --accent-trust: var(--mauve);
  --accent-cost: var(--green);
  --accent-context: var(--sapphire);
  --accent-trail: var(--teal);
  --accent-memory: var(--pink);
  --accent-codehealth: var(--peach);

  --sidebar-width: 56px;
  --metrics-height: 52px;
}

/* ================================================================
   RESET & BASE
   ================================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-display);
  background: var(--crust);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ================================================================
   ANIMATED BACKGROUND
   ================================================================ */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.bg-noise {
  position: absolute;
  inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
  mix-blend-mode: overlay;
}

.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  will-change: transform;
}

.bg-orb:nth-child(1) {
  width: 700px; height: 700px;
  background: radial-gradient(circle, var(--mauve), transparent 70%);
  top: -250px; left: -200px;
  opacity: 0.15;
  animation: orbFloat1 28s ease-in-out infinite;
}

.bg-orb:nth-child(2) {
  width: 550px; height: 550px;
  background: radial-gradient(circle, var(--blue), transparent 70%);
  top: 35%; right: -200px;
  opacity: 0.12;
  animation: orbFloat2 32s ease-in-out infinite;
}

.bg-orb:nth-child(3) {
  width: 500px; height: 500px;
  background: radial-gradient(circle, var(--teal), transparent 70%);
  bottom: -150px; left: 25%;
  opacity: 0.13;
  animation: orbFloat3 24s ease-in-out infinite;
}

.bg-orb:nth-child(4) {
  width: 400px; height: 400px;
  background: radial-gradient(circle, var(--pink), transparent 70%);
  top: 60%; left: 10%;
  opacity: 0.08;
  animation: orbFloat1 35s ease-in-out infinite reverse;
}

@keyframes orbFloat1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(60px, -50px) scale(1.08); }
  50% { transform: translate(-30px, 60px) scale(0.92); }
  75% { transform: translate(50px, 30px) scale(1.04); }
}
@keyframes orbFloat2 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(-70px, 40px) scale(1.06); }
  66% { transform: translate(40px, -60px) scale(0.94); }
}
@keyframes orbFloat3 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  20% { transform: translate(50px, -40px) scale(1.1); }
  40% { transform: translate(-40px, 20px) scale(0.96); }
  60% { transform: translate(30px, 50px) scale(1.02); }
  80% { transform: translate(-60px, -20px) scale(0.98); }
}

.bg-grid {
  position: absolute;
  inset: -50%;
  width: 200%;
  height: 200%;
  background-image:
    linear-gradient(rgba(180, 190, 254, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180, 190, 254, 0.04) 1px, transparent 1px);
  background-size: 52px 52px;
  animation: gridDrift 60s linear infinite;
}

@keyframes gridDrift {
  0% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(52px, 52px) rotate(0.5deg); }
}

/* ================================================================
   SIDEBAR
   ================================================================ */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: var(--sidebar-width);
  height: 100vh;
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: rgba(17, 17, 27, 0.92);
  backdrop-filter: blur(24px) saturate(1.3);
  -webkit-backdrop-filter: blur(24px) saturate(1.3);
  border-right: 1px solid rgba(69, 71, 90, 0.25);
  padding: 10px 0 14px;
  gap: 2px;
}

.sidebar-logo {
  width: 34px;
  height: 34px;
  margin-bottom: 10px;
  border-radius: 10px;
  overflow: hidden;
  background: radial-gradient(circle, var(--surface0) 0%, var(--crust) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  filter: drop-shadow(0 0 8px rgba(180, 190, 254, 0.2));
}

.sidebar-logo img {
  width: 26px;
  height: 26px;
  object-fit: contain;
}

.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
}

.sidebar-divider {
  width: 28px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--surface1), transparent);
  margin: 6px 0;
}

.nav-item {
  position: relative;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  cursor: pointer;
  color: var(--overlay1);
  transition: all 0.2s ease;
  border: none;
  background: none;
  padding: 0;
}

.nav-item:hover {
  color: var(--text);
  background: rgba(49, 50, 68, 0.4);
}

.nav-item.active {
  color: var(--lavender);
  background: rgba(180, 190, 254, 0.1);
}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: -8px;
  width: 3px;
  height: 20px;
  border-radius: 0 3px 3px 0;
  background: var(--lavender);
}

.nav-item svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Tooltip */
.nav-item .tooltip {
  position: absolute;
  left: 52px;
  background: var(--surface0);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 500;
  padding: 5px 10px;
  border-radius: 6px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transform: translateX(-4px);
  transition: all 0.15s ease;
  border: 1px solid rgba(69, 71, 90, 0.4);
  z-index: 300;
}

.nav-item:hover .tooltip {
  opacity: 1;
  transform: translateX(0);
}

.sidebar-bottom {
  margin-top: auto;
}

/* ================================================================
   METRICS BAR
   ================================================================ */
.metrics-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  height: var(--metrics-height);
  padding: 0 24px;
  background: rgba(17, 17, 27, 0.88);
  backdrop-filter: blur(32px) saturate(1.4);
  -webkit-backdrop-filter: blur(32px) saturate(1.4);
  border-bottom: 1px solid rgba(180, 190, 254, 0.06);
  gap: 0;
}

.metrics-bar::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg,
    var(--mauve), var(--lavender), var(--blue), var(--sapphire),
    var(--teal), var(--green), var(--yellow), var(--peach),
    var(--red), var(--pink), var(--mauve));
  background-size: 200% 100%;
  animation: rainbowShift 8s linear infinite;
}

@keyframes rainbowShift {
  0% { background-position: 0% 0%; }
  100% { background-position: 200% 0%; }
}

.metric {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
  border: 1px solid transparent;
}

.metric:hover {
  background: rgba(49, 50, 68, 0.4);
  border-color: rgba(69, 71, 90, 0.3);
}

.metric-icon {
  font-size: 0.85rem;
}

.metric-value {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
}

.metric-label {
  font-size: 0.62rem;
  font-weight: 500;
  color: var(--subtext0);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.metric-sub {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--overlay1);
}

.metrics-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.connection-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 16px;
  background: rgba(49, 50, 68, 0.4);
  border: 1px solid rgba(49, 50, 68, 0.6);
  transition: all 0.4s ease;
}

.connection-indicator.connected {
  border-color: rgba(166, 227, 161, 0.25);
  background: rgba(166, 227, 161, 0.06);
}

.connection-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--overlay0);
  transition: all 0.4s ease;
}

.connection-indicator.connected .connection-dot {
  background: var(--green);
  box-shadow: 0 0 8px rgba(166, 227, 161, 0.7);
  animation: dotPulse 2s ease-in-out infinite;
}

@keyframes dotPulse {
  0%, 100% { box-shadow: 0 0 6px rgba(166, 227, 161, 0.4); }
  50% { box-shadow: 0 0 14px rgba(166, 227, 161, 0.9); }
}

.connection-label {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  font-weight: 600;
  color: var(--overlay0);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.connection-indicator.connected .connection-label {
  color: var(--green);
}

.header-time {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--subtext0);
  padding: 3px 8px;
  background: rgba(49, 50, 68, 0.25);
  border-radius: 6px;
  border: 1px solid rgba(49, 50, 68, 0.3);
}

/* ================================================================
   MAIN AREA
   ================================================================ */
.main-area {
  margin-left: var(--sidebar-width);
  min-height: 100vh;
  position: relative;
  z-index: 2;
}

.workspace {
  padding: 22px 28px 52px;
  max-width: 1480px;
  margin: 0 auto;
}

/* ================================================================
   VIEW CONTAINERS
   ================================================================ */
.view {
  display: none;
  opacity: 0;
  transition: opacity 0.15s ease;
}

.view.active {
  display: block;
  opacity: 1;
}

/* ================================================================
   CARDS — Glass-morphism
   ================================================================ */
.card {
  position: relative;
  background: rgba(24, 24, 37, 0.78);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  border: 1px solid rgba(69, 71, 90, 0.35);
  border-radius: 16px;
  padding: 22px 24px;
  transition: border-color 0.35s ease, box-shadow 0.35s ease, transform 0.3s ease;
  overflow: hidden;
}

.card:hover {
  border-color: rgba(180, 190, 254, 0.15);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(180, 190, 254, 0.06);
  transform: translateY(-1px);
}

.card-title {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--subtext0);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-title .accent-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

/* ================================================================
   PANEL ICON SPRITESHEET — 3D glass-morphism icons
   1536x1024 image, 3x2 grid = 512x512 per icon
   ================================================================ */
.panel-icon {
  width: 48px;
  height: 48px;
  background-image: url('/assets/dashboardicons.png');
  background-size: 300% 200%;
  background-repeat: no-repeat;
  flex-shrink: 0;
  image-rendering: auto;
  filter: drop-shadow(0 0 6px rgba(180, 190, 254, 0.25));
  transition: filter 0.4s ease, transform 0.4s ease;
}

.panel-icon:hover,
.card:hover .panel-icon,
.mini-card:hover .panel-icon {
  filter: drop-shadow(0 0 12px rgba(180, 190, 254, 0.45));
  transform: scale(1.1);
}

.panel-icon-lg {
  width: 80px;
  height: 80px;
}

/* Row 1: Rocket, Crystal $, Windows */
.panel-icon-exec     { background-position: 0% 0%; }
.panel-icon-cost     { background-position: 50% 0%; }
.panel-icon-sessions { background-position: 100% 0%; }
/* Row 2: Shield, Brain, Path */
.panel-icon-trust    { background-position: 0% 100%; }
.panel-icon-memory   { background-position: 50% 100%; }
.panel-icon-trail    { background-position: 100% 100%; }

/* ================================================================
   BADGES & PILLS
   ================================================================ */
.badge {
  display: inline-flex;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 0.58rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.badge-success { background: rgba(166, 227, 161, 0.12); color: var(--green); border: 1px solid rgba(166, 227, 161, 0.2); }
.badge-warning { background: rgba(249, 226, 175, 0.12); color: var(--yellow); border: 1px solid rgba(249, 226, 175, 0.2); }
.badge-error   { background: rgba(243, 139, 168, 0.12); color: var(--red); border: 1px solid rgba(243, 139, 168, 0.2); }
.badge-info    { background: rgba(137, 180, 250, 0.12); color: var(--blue); border: 1px solid rgba(137, 180, 250, 0.2); }
.badge-neutral { background: rgba(108, 112, 134, 0.15); color: var(--overlay1); border: 1px solid rgba(108, 112, 134, 0.2); }

/* Type badges for trail */
.type-routing    { background: rgba(166, 227, 161, 0.1); color: var(--green); border: 1px solid rgba(166, 227, 161, 0.15); }
.type-execution  { background: rgba(180, 190, 254, 0.1); color: var(--lavender); border: 1px solid rgba(180, 190, 254, 0.15); }
.type-decision   { background: rgba(137, 180, 250, 0.1); color: var(--blue); border: 1px solid rgba(137, 180, 250, 0.15); }
.type-governance { background: rgba(203, 166, 247, 0.1); color: var(--mauve); border: 1px solid rgba(203, 166, 247, 0.15); }
.type-verification { background: rgba(148, 226, 213, 0.1); color: var(--teal); border: 1px solid rgba(148, 226, 213, 0.15); }
.type-error      { background: rgba(243, 139, 168, 0.1); color: var(--red); border: 1px solid rgba(243, 139, 168, 0.15); }

/* ================================================================
   PROGRESS BARS
   ================================================================ */
.progress-bar {
  width: 100%;
  height: 6px;
  background: rgba(49, 50, 68, 0.5);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}

.progress-green  .progress-fill { background: linear-gradient(90deg, var(--green), var(--teal)); }
.progress-blue   .progress-fill { background: linear-gradient(90deg, var(--blue), var(--lavender)); }
.progress-yellow .progress-fill { background: linear-gradient(90deg, var(--yellow), var(--peach)); }
.progress-red    .progress-fill { background: linear-gradient(90deg, var(--red), var(--peach)); }
.progress-mauve  .progress-fill { background: linear-gradient(90deg, var(--mauve), var(--pink)); }

/* ================================================================
   EMPTY STATES
   ================================================================ */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
}

.empty-state-icon {
  width: 48px;
  height: 48px;
  margin-bottom: 14px;
  color: var(--overlay0);
}

.empty-state-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1rem;
  color: var(--subtext1);
  margin-bottom: 6px;
}

.empty-state-text {
  font-size: 0.78rem;
  color: var(--overlay1);
  line-height: 1.5;
  max-width: 300px;
}

/* ================================================================
   SVG CHART CONTAINERS
   ================================================================ */
.chart-container {
  width: 100%;
  overflow: hidden;
  border-radius: 8px;
}

.chart-container svg {
  display: block;
  width: 100%;
}

/* ================================================================
   TRAIL SEARCH/FILTER
   ================================================================ */
.trail-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.trail-search {
  flex: 1;
  min-width: 180px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  padding: 7px 12px;
  background: rgba(49, 50, 68, 0.4);
  border: 1px solid rgba(69, 71, 90, 0.4);
  border-radius: 8px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s ease;
}

.trail-search:focus {
  border-color: var(--lavender);
}

.trail-search::placeholder {
  color: var(--overlay0);
}

.filter-btn {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 5px 12px;
  border-radius: 14px;
  border: 1px solid rgba(69, 71, 90, 0.4);
  background: rgba(49, 50, 68, 0.3);
  color: var(--overlay1);
  cursor: pointer;
  transition: all 0.2s ease;
}

.filter-btn:hover {
  background: rgba(49, 50, 68, 0.6);
  color: var(--text);
}

.filter-btn.active {
  background: rgba(180, 190, 254, 0.12);
  color: var(--lavender);
  border-color: rgba(180, 190, 254, 0.25);
}

/* ================================================================
   TASK STATUS BARS
   ================================================================ */
.task-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(49, 50, 68, 0.3);
  cursor: pointer;
  transition: background 0.15s ease;
}

.task-bar:hover {
  background: rgba(49, 50, 68, 0.2);
}

.task-status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.task-status-dot.done { background: var(--green); }
.task-status-dot.active { background: var(--lavender); animation: dotPulse 2s ease-in-out infinite; }
.task-status-dot.pending { background: var(--overlay0); border: 1px dashed var(--surface2); }

.task-name {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.task-detail {
  display: none;
  padding: 8px 18px 12px;
  font-size: 0.72rem;
  color: var(--subtext0);
  line-height: 1.5;
  border-bottom: 1px solid rgba(49, 50, 68, 0.3);
}

.task-detail.expanded { display: block; }

/* ================================================================
   CODE HEALTH
   ================================================================ */
.health-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: 0.68rem;
}

.health-table th {
  text-align: left;
  font-weight: 600;
  color: var(--subtext0);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 6px 10px;
  border-bottom: 1px solid rgba(69, 71, 90, 0.3);
  font-size: 0.6rem;
}

.health-table td {
  padding: 6px 10px;
  border-bottom: 1px solid rgba(49, 50, 68, 0.2);
  color: var(--text);
}

.complexity-bar {
  height: 6px;
  border-radius: 3px;
  background: rgba(49, 50, 68, 0.5);
  overflow: hidden;
  min-width: 60px;
}

.complexity-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}

.complexity-fill.low { background: var(--green); }
.complexity-fill.medium { background: var(--yellow); }
.complexity-fill.high { background: var(--red); }

.stat-box {
  background: rgba(49, 50, 68, 0.3);
  border: 1px solid rgba(69, 71, 90, 0.3);
  border-radius: 10px;
  padding: 14px 18px;
  text-align: center;
}

.stat-box-value {
  font-family: var(--font-mono);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
}

.stat-box-label {
  font-size: 0.62rem;
  color: var(--overlay1);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 2px;
}

/* ================================================================
   EXPANDABLE LIST ITEMS
   ================================================================ */
.expand-section {
  margin-bottom: 16px;
}

.expand-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: rgba(49, 50, 68, 0.25);
  border: 1px solid rgba(69, 71, 90, 0.2);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.expand-header:hover {
  background: rgba(49, 50, 68, 0.4);
}

.expand-header-title {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--subtext1);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.expand-header-count {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--overlay1);
}

.expand-header-arrow {
  color: var(--overlay1);
  transition: transform 0.2s ease;
  font-size: 0.7rem;
}

.expand-section.open .expand-header-arrow {
  transform: rotate(90deg);
}

.expand-body {
  display: none;
  padding: 8px 0 0;
}

.expand-section.open .expand-body {
  display: block;
}

.expand-item {
  padding: 8px 14px;
  border-left: 2px solid rgba(69, 71, 90, 0.3);
  margin-left: 8px;
  margin-bottom: 4px;
  cursor: pointer;
  transition: all 0.15s ease;
  border-radius: 0 6px 6px 0;
}

.expand-item:hover {
  background: rgba(49, 50, 68, 0.2);
  border-left-color: var(--lavender);
}

.expand-item-title {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text);
}

.expand-item-detail {
  display: none;
  margin-top: 6px;
  font-size: 0.68rem;
  color: var(--subtext0);
  line-height: 1.4;
}

.expand-item.open .expand-item-detail {
  display: block;
}

/* ================================================================
   SHORTCUT OVERLAY
   ================================================================ */
.shortcut-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(17, 17, 27, 0.8);
  backdrop-filter: blur(8px);
  align-items: center;
  justify-content: center;
}

.shortcut-overlay.active {
  display: flex;
}

.shortcut-modal {
  background: var(--mantle);
  border: 1px solid rgba(69, 71, 90, 0.4);
  border-radius: 16px;
  padding: 28px 36px;
  max-width: 420px;
  width: 90%;
}

.shortcut-modal h2 {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 18px;
}

.shortcut-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
}

.shortcut-key {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 600;
  background: var(--surface0);
  color: var(--lavender);
  padding: 3px 10px;
  border-radius: 5px;
  border: 1px solid rgba(69, 71, 90, 0.3);
}

.shortcut-desc {
  font-size: 0.75rem;
  color: var(--subtext0);
}

/* ================================================================
   SKELETON LOADING
   ================================================================ */
.skeleton {
  background: linear-gradient(90deg, rgba(49, 50, 68, 0.3) 25%, rgba(69, 71, 90, 0.3) 50%, rgba(49, 50, 68, 0.3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
  border-radius: 6px;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ================================================================
   OVERVIEW GRID
   ================================================================ */
.overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}

.mini-card {
  position: relative;
  background: rgba(24, 24, 37, 0.78);
  backdrop-filter: blur(24px) saturate(1.2);
  border: 1px solid rgba(69, 71, 90, 0.35);
  border-radius: 14px;
  padding: 18px 20px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.mini-card:hover {
  border-color: rgba(180, 190, 254, 0.2);
  box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
  transform: translateY(-2px);
}

.mini-card-title {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--subtext0);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.mini-card-value {
  font-family: var(--font-mono);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
}

.mini-card-sub {
  font-size: 0.68rem;
  color: var(--overlay1);
  margin-top: 4px;
}

/* Robot on overview */
.overview-robot {
  display: flex;
  justify-content: center;
  margin-bottom: 28px;
}

.overview-robot img {
  width: 80px;
  height: 80px;
  object-fit: contain;
  border-radius: 50%;
  background: radial-gradient(circle, var(--crust) 55%, transparent 75%);
  padding: 6px;
  filter: drop-shadow(0 0 20px rgba(180, 190, 254, 0.4))
          drop-shadow(0 0 50px rgba(203, 166, 247, 0.2));
  animation: robotFloat 4s ease-in-out infinite;
}

@keyframes robotFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* ================================================================
   TRAIL ENTRIES
   ================================================================ */
.trail-entry {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border-bottom: 1px solid rgba(49, 50, 68, 0.2);
  cursor: pointer;
  transition: background 0.15s ease;
}

.trail-entry:hover {
  background: rgba(49, 50, 68, 0.15);
}

.trail-entry-time {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--overlay0);
  white-space: nowrap;
  min-width: 52px;
}

.trail-entry-desc {
  font-size: 0.74rem;
  color: var(--text);
  flex: 1;
  line-height: 1.4;
}

.trail-entry-detail {
  display: none;
  padding: 8px 12px 8px 72px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--subtext0);
  background: rgba(49, 50, 68, 0.1);
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.4;
  border-bottom: 1px solid rgba(49, 50, 68, 0.2);
}

.trail-entry-detail.expanded { display: block; }

.trail-cursor {
  display: inline-block;
  width: 8px;
  height: 14px;
  background: var(--teal);
  animation: blink 1s step-end infinite;
  margin-left: 4px;
  vertical-align: middle;
  border-radius: 1px;
}

@keyframes blink {
  0%, 50% { opacity: 1; }
  50.01%, 100% { opacity: 0; }
}

/* ================================================================
   SESSION CARDS
   ================================================================ */
.session-card {
  background: rgba(49, 50, 68, 0.2);
  border: 1px solid rgba(69, 71, 90, 0.25);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  transition: all 0.2s ease;
}

.session-card.stale {
  opacity: 0.5;
}

.session-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.session-id {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--subtext0);
}

.session-ide {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 2px 8px;
  border-radius: 8px;
  background: rgba(137, 180, 250, 0.1);
  color: var(--blue);
  border: 1px solid rgba(137, 180, 250, 0.15);
}

.project-group-header {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--subtext0);
  padding: 8px 0 6px;
  border-bottom: 1px solid rgba(49, 50, 68, 0.3);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* ================================================================
   TRUST GAUGE
   ================================================================ */
.gauge-container {
  display: flex;
  justify-content: center;
  margin: 14px 0;
}

.tier-ladder {
  display: flex;
  gap: 6px;
  margin: 14px 0;
}

.tier-box {
  flex: 1;
  text-align: center;
  padding: 10px 8px;
  border-radius: 8px;
  background: rgba(49, 50, 68, 0.2);
  border: 1px solid rgba(69, 71, 90, 0.2);
  transition: all 0.3s ease;
}

.tier-box.current {
  background: rgba(203, 166, 247, 0.12);
  border-color: rgba(203, 166, 247, 0.3);
  box-shadow: 0 0 12px rgba(203, 166, 247, 0.1);
}

.tier-box-name {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--overlay1);
}

.tier-box.current .tier-box-name {
  color: var(--mauve);
}

/* ================================================================
   MEMORY STATS ROW
   ================================================================ */
.memory-stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 18px;
}

/* ================================================================
   RESPONSIVE
   ================================================================ */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main-area { margin-left: 0; }
  .overview-grid { grid-template-columns: 1fr; }
  .tier-ladder { flex-direction: column; }
  .memory-stats-row { grid-template-columns: 1fr; }
}

/* ================================================================
   SCROLL LOCK TOGGLE
   ================================================================ */
.scroll-lock-btn {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 3px 10px;
  border-radius: 12px;
  border: 1px solid rgba(69, 71, 90, 0.4);
  background: rgba(49, 50, 68, 0.3);
  color: var(--overlay1);
  cursor: pointer;
  transition: all 0.2s ease;
}

.scroll-lock-btn.active {
  background: rgba(148, 226, 213, 0.12);
  color: var(--teal);
  border-color: rgba(148, 226, 213, 0.3);
}

/* ================================================================
   UTILITY
   ================================================================ */
.flex-row { display: flex; align-items: center; gap: 10px; }
.flex-col { display: flex; flex-direction: column; gap: 10px; }
.gap-sm { gap: 6px; }
.gap-md { gap: 12px; }
.gap-lg { gap: 20px; }
.mt-sm { margin-top: 8px; }
.mt-md { margin-top: 16px; }
.mb-sm { margin-bottom: 8px; }
.mb-md { margin-bottom: 16px; }
.text-mono { font-family: var(--font-mono); }
.text-sm { font-size: 0.72rem; }
.text-xs { font-size: 0.62rem; }
.text-muted { color: var(--overlay1); }
.text-sub { color: var(--subtext0); }

/* Refresh button */
.refresh-btn {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 4px 12px;
  border-radius: 8px;
  border: 1px solid rgba(69, 71, 90, 0.4);
  background: rgba(49, 50, 68, 0.3);
  color: var(--overlay1);
  cursor: pointer;
  transition: all 0.2s ease;
}

.refresh-btn:hover {
  background: rgba(49, 50, 68, 0.6);
  color: var(--text);
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-layer">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>
</div>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <img src="/assets/juhbdilogo.png" alt="JuhBDI">
  </div>
  <div class="sidebar-nav" id="sidebarNav">
    <button class="nav-item active" data-view="overview">
      <svg viewBox="0 0 18 18"><rect x="2" y="2" width="5.5" height="5.5" rx="1.5"/><rect x="10.5" y="2" width="5.5" height="5.5" rx="1.5"/><rect x="2" y="10.5" width="5.5" height="5.5" rx="1.5"/><rect x="10.5" y="10.5" width="5.5" height="5.5" rx="1.5"/></svg>
      <span class="tooltip">Overview</span>
    </button>
    <button class="nav-item" data-view="execution">
      <svg viewBox="0 0 18 18"><path d="M6 3l8 6-8 6V3z"/></svg>
      <span class="tooltip">Execution</span>
    </button>
    <button class="nav-item" data-view="cost">
      <svg viewBox="0 0 18 18"><circle cx="9" cy="9" r="7"/><path d="M9 4.5v9M6.5 6.5h4a1.5 1.5 0 010 3H7.5a1.5 1.5 0 000 3h4"/></svg>
      <span class="tooltip">Cost Intelligence</span>
    </button>
    <button class="nav-item" data-view="trust">
      <svg viewBox="0 0 18 18"><path d="M9 2l6 3v4c0 3.5-2.5 6.5-6 7.5C5.5 15.5 3 12.5 3 9V5l6-3z"/></svg>
      <span class="tooltip">Trust & Governance</span>
    </button>
    <button class="nav-item" data-view="sessions">
      <svg viewBox="0 0 18 18"><rect x="2" y="3" width="14" height="10" rx="2"/><path d="M5 16h8"/><path d="M9 13v3"/></svg>
      <span class="tooltip">Sessions & Context</span>
    </button>
    <button class="nav-item" data-view="trail">
      <svg viewBox="0 0 18 18"><path d="M3 9h2l2-4 3 8 2-4h3"/></svg>
      <span class="tooltip">Decision Trail</span>
    </button>
    <button class="nav-item" data-view="memory">
      <svg viewBox="0 0 18 18"><path d="M9 2C5 2 3 5 3 9s2 7 6 7 6-3 6-7-2-7-6-7z"/><path d="M9 2c2 2 3 5 3 7s-1 5-3 7"/><path d="M9 2c-2 2-3 5-3 7s1 5 3 7"/><path d="M3 9h12"/></svg>
      <span class="tooltip">Intelligence Memory</span>
    </button>
    <div class="sidebar-divider"></div>
    <button class="nav-item" data-view="codehealth">
      <svg viewBox="0 0 18 18"><path d="M5 5l-3 4 3 4"/><path d="M13 5l3 4-3 4"/><path d="M10 3L8 15"/></svg>
      <span class="tooltip">Code Health</span>
    </button>
  </div>
  <div class="sidebar-bottom">
    <button class="nav-item" id="btnShortcuts" title="Keyboard shortcuts">
      <svg viewBox="0 0 18 18"><rect x="1.5" y="5" width="15" height="9" rx="2"/><path d="M5 8h1M8.5 8h1M12 8h1M4 11h10"/></svg>
      <span class="tooltip">Shortcuts (?)</span>
    </button>
  </div>
</nav>

<!-- Main Area -->
<div class="main-area">

  <!-- Metrics Bar -->
  <header class="metrics-bar" id="metricsBar">
    <div class="metric" id="metricExec" data-view="execution">
      <span class="metric-icon">&#9654;</span>
      <div>
        <div class="metric-value" id="metricExecValue">--</div>
        <div class="metric-label">Wave</div>
      </div>
    </div>
    <div class="metric" id="metricCost" data-view="cost">
      <span class="metric-icon">$</span>
      <div>
        <div class="metric-value" id="metricCostValue">--</div>
        <div class="metric-label">Spend</div>
      </div>
      <span class="metric-sub" id="metricCostSub"></span>
    </div>
    <div class="metric" id="metricTrust" data-view="trust">
      <span class="metric-icon">&#9741;</span>
      <div>
        <div class="metric-value" id="metricTrustValue">--</div>
        <div class="metric-label">Trust</div>
      </div>
      <span class="metric-sub" id="metricTrustSub"></span>
    </div>
    <div class="metric" id="metricContext" data-view="sessions">
      <span class="metric-icon">&#9679;</span>
      <div>
        <div class="metric-value" id="metricCtxValue">--</div>
        <div class="metric-label">Context</div>
      </div>
    </div>
    <div class="metrics-right">
      <div class="connection-indicator" id="connectionIndicator">
        <div class="connection-dot"></div>
        <span class="connection-label">SSE</span>
      </div>
      <div class="header-time" id="headerTime">--:--:--</div>
    </div>
  </header>

  <!-- Workspace -->
  <main class="workspace" id="workspace">
    <div class="view active" id="viewOverview" data-view="overview"></div>
    <div class="view" id="viewExecution" data-view="execution"></div>
    <div class="view" id="viewCost" data-view="cost"></div>
    <div class="view" id="viewTrust" data-view="trust"></div>
    <div class="view" id="viewSessions" data-view="sessions"></div>
    <div class="view" id="viewTrail" data-view="trail"></div>
    <div class="view" id="viewMemory" data-view="memory"></div>
    <div class="view" id="viewCodehealth" data-view="codehealth"></div>
  </main>
</div>

<!-- Keyboard Shortcut Overlay -->
<div class="shortcut-overlay" id="shortcutOverlay">
  <div class="shortcut-modal">
    <h2>Keyboard Shortcuts</h2>
    <div class="shortcut-row"><span class="shortcut-key">1</span><span class="shortcut-desc">Overview</span></div>
    <div class="shortcut-row"><span class="shortcut-key">2</span><span class="shortcut-desc">Execution</span></div>
    <div class="shortcut-row"><span class="shortcut-key">3</span><span class="shortcut-desc">Cost Intelligence</span></div>
    <div class="shortcut-row"><span class="shortcut-key">4</span><span class="shortcut-desc">Trust & Governance</span></div>
    <div class="shortcut-row"><span class="shortcut-key">5</span><span class="shortcut-desc">Sessions & Context</span></div>
    <div class="shortcut-row"><span class="shortcut-key">6</span><span class="shortcut-desc">Decision Trail</span></div>
    <div class="shortcut-row"><span class="shortcut-key">7</span><span class="shortcut-desc">Intelligence Memory</span></div>
    <div class="shortcut-row"><span class="shortcut-key">8</span><span class="shortcut-desc">Code Health</span></div>
    <div class="shortcut-row"><span class="shortcut-key">/</span><span class="shortcut-desc">Focus trail search</span></div>
    <div class="shortcut-row"><span class="shortcut-key">Esc</span><span class="shortcut-desc">Close / Overview</span></div>
    <div class="shortcut-row"><span class="shortcut-key">?</span><span class="shortcut-desc">Toggle this overlay</span></div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
