<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JuhBDI — Governance Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   DESIGN TOKENS — Catppuccin Mocha + JuhBDI accents
   ================================================================ */
@property --border-angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}

:root {
  --base: #1e1e2e;
  --mantle: #181825;
  --crust: #11111b;
  --surface0: #313244;
  --surface1: #45475a;
  --surface2: #585b70;
  --text: #cdd6f4;
  --subtext0: #a6adc8;
  --subtext1: #bac2de;
  --lavender: #b4befe;
  --blue: #89b4fa;
  --sapphire: #74c7ec;
  --teal: #94e2d5;
  --green: #a6e3a1;
  --yellow: #f9e2af;
  --peach: #fab387;
  --red: #f38ba8;
  --mauve: #cba6f7;
  --pink: #f5c2e7;
  --flamingo: #f2cdcd;
  --rosewater: #f5e0dc;
  --overlay0: #6c7086;
  --overlay1: #7f849c;
  --overlay2: #9399b2;

  --font-display: 'Outfit', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', 'Fira Code', monospace;

  --accent-exec: var(--lavender);
  --accent-trust: var(--mauve);
  --accent-cost: var(--green);
  --accent-context: var(--sapphire);
  --accent-trail: var(--teal);
  --accent-memory: var(--pink);
}

/* ================================================================
   RESET & BASE
   ================================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-display);
  background: var(--crust);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ================================================================
   ANIMATED BACKGROUND — Gradient orbs + drifting grid + noise
   ================================================================ */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

/* SVG noise filter for grain texture */
.bg-noise {
  position: absolute;
  inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
  mix-blend-mode: overlay;
}

.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  will-change: transform;
}

.bg-orb:nth-child(1) {
  width: 700px; height: 700px;
  background: radial-gradient(circle, var(--mauve), transparent 70%);
  top: -250px; left: -200px;
  opacity: 0.15;
  animation: orbFloat1 28s ease-in-out infinite;
}

.bg-orb:nth-child(2) {
  width: 550px; height: 550px;
  background: radial-gradient(circle, var(--blue), transparent 70%);
  top: 35%; right: -200px;
  opacity: 0.12;
  animation: orbFloat2 32s ease-in-out infinite;
}

.bg-orb:nth-child(3) {
  width: 500px; height: 500px;
  background: radial-gradient(circle, var(--teal), transparent 70%);
  bottom: -150px; left: 25%;
  opacity: 0.13;
  animation: orbFloat3 24s ease-in-out infinite;
}

.bg-orb:nth-child(4) {
  width: 400px; height: 400px;
  background: radial-gradient(circle, var(--pink), transparent 70%);
  top: 60%; left: 10%;
  opacity: 0.08;
  animation: orbFloat1 35s ease-in-out infinite reverse;
}

@keyframes orbFloat1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(60px, -50px) scale(1.08); }
  50% { transform: translate(-30px, 60px) scale(0.92); }
  75% { transform: translate(50px, 30px) scale(1.04); }
}

@keyframes orbFloat2 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(-70px, 40px) scale(1.06); }
  66% { transform: translate(40px, -60px) scale(0.94); }
}

@keyframes orbFloat3 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  20% { transform: translate(50px, -40px) scale(1.1); }
  40% { transform: translate(-40px, 20px) scale(0.96); }
  60% { transform: translate(30px, 50px) scale(1.02); }
  80% { transform: translate(-60px, -20px) scale(0.98); }
}

/* Drifting grid overlay */
.bg-grid {
  position: absolute;
  inset: -50%;
  width: 200%;
  height: 200%;
  background-image:
    linear-gradient(rgba(180, 190, 254, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180, 190, 254, 0.04) 1px, transparent 1px);
  background-size: 52px 52px;
  animation: gridDrift 60s linear infinite;
}

@keyframes gridDrift {
  0% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(52px, 52px) rotate(0.5deg); }
}

/* ================================================================
   HEADER — Command center top bar
   ================================================================ */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  height: 58px;
  background: rgba(17, 17, 27, 0.88);
  backdrop-filter: blur(32px) saturate(1.4);
  -webkit-backdrop-filter: blur(32px) saturate(1.4);
  border-bottom: 1px solid rgba(180, 190, 254, 0.06);
}

/* Animated rainbow gradient line at top */
.header::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg,
    var(--mauve), var(--lavender), var(--blue), var(--sapphire),
    var(--teal), var(--green), var(--yellow), var(--peach),
    var(--red), var(--pink), var(--mauve));
  background-size: 200% 100%;
  animation: rainbowShift 8s linear infinite;
}

@keyframes rainbowShift {
  0% { background-position: 0% 0%; }
  100% { background-position: 200% 0%; }
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-brand {
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 1.3rem;
  background: linear-gradient(135deg, var(--lavender) 0%, var(--mauve) 50%, var(--pink) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 12px rgba(180, 190, 254, 0.3));
}

.header-divider {
  width: 1px;
  height: 22px;
  background: linear-gradient(180deg, transparent, var(--surface1), transparent);
}

.header-subtitle {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 0.78rem;
  color: var(--subtext0);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.connection-indicator {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 14px;
  border-radius: 20px;
  background: rgba(49, 50, 68, 0.4);
  border: 1px solid rgba(49, 50, 68, 0.6);
  transition: all 0.4s ease;
}

.connection-indicator.connected {
  border-color: rgba(166, 227, 161, 0.25);
  background: rgba(166, 227, 161, 0.06);
  box-shadow: 0 0 12px rgba(166, 227, 161, 0.08);
}

.connection-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--overlay0);
  transition: all 0.4s ease;
}

.connection-indicator.connected .connection-dot {
  background: var(--green);
  box-shadow: 0 0 8px rgba(166, 227, 161, 0.7);
  animation: dotPulse 2s ease-in-out infinite;
}

@keyframes dotPulse {
  0%, 100% { box-shadow: 0 0 6px rgba(166, 227, 161, 0.4); }
  50% { box-shadow: 0 0 14px rgba(166, 227, 161, 0.9); }
}

.connection-label {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  font-weight: 600;
  color: var(--overlay0);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  transition: color 0.4s ease;
}

.connection-indicator.connected .connection-label {
  color: var(--green);
}

.header-time {
  font-family: var(--font-mono);
  font-size: 0.74rem;
  font-weight: 500;
  color: var(--subtext0);
  letter-spacing: 0.04em;
  padding: 4px 10px;
  background: rgba(49, 50, 68, 0.25);
  border-radius: 8px;
  border: 1px solid rgba(49, 50, 68, 0.3);
}

/* ================================================================
   DASHBOARD GRID — Robot-centric command layout
   ================================================================ */
.dashboard {
  position: relative;
  z-index: 2;
  padding: 22px 28px 52px;
  max-width: 1540px;
  margin: 0 auto;
}

/* Top 4 panels: 2x2 grid with robot overlaid in center */
.command-hub {
  position: relative;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto 100px auto;
  gap: 18px;
  margin-bottom: 18px;
}
/* Place panels explicitly in rows 1 and 3, leaving row 2 for robot */
.command-hub > .card:nth-child(1),
.command-hub > .card:nth-child(2) { /* transmision-layer + robot are children 1,2 */ }
#panelExec    { grid-row: 1; grid-column: 1; }
#panelTrust   { grid-row: 1; grid-column: 2; }
#panelCost    { grid-row: 3; grid-column: 1; }
#panelContext  { grid-row: 3; grid-column: 2; }

/* Bottom row: Trail + Memory side by side */
.bottom-row {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 18px;
}

@media (max-width: 1100px) {
  .command-hub { grid-template-columns: 1fr; }
  .bottom-row { grid-template-columns: 1fr; }
  .command-hub .card { grid-column: 1 !important; }
  .robot-nexus { display: none; }
  .transmission-layer { display: none; }
}

/* ── Robot Nexus — dedicated row between the 4 panels ────── */
.robot-nexus {
  grid-row: 2;
  grid-column: 1 / -1;
  z-index: 10;
  width: 120px;
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  justify-self: center;
  align-self: center;
  pointer-events: none;
  position: relative;
}

.robot-nexus img {
  width: 90px;
  height: 90px;
  object-fit: contain;
  border-radius: 50%;
  background: radial-gradient(circle, var(--crust) 55%, transparent 75%);
  padding: 6px;
  filter: drop-shadow(0 0 20px rgba(180, 190, 254, 0.5))
          drop-shadow(0 0 50px rgba(203, 166, 247, 0.25));
  animation: robotFloat 4s ease-in-out infinite;
  position: relative;
  z-index: 2;
}

/* Outer ring */
.robot-nexus::before {
  content: '';
  position: absolute;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 1.5px solid rgba(180, 190, 254, 0.2);
  animation: robotAura 3s ease-in-out infinite alternate;
  box-shadow: 0 0 30px rgba(180, 190, 254, 0.06), inset 0 0 30px rgba(180, 190, 254, 0.04);
}

/* Inner glow disc */
.robot-nexus::after {
  content: '';
  position: absolute;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(17, 17, 27, 0.95) 40%, rgba(24, 24, 37, 0.8) 65%, transparent 80%);
  z-index: 1;
}

@keyframes robotFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

@keyframes robotAura {
  0% { opacity: 0.6; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.15); }
}

/* ── Transmission Lines (SVG overlay) ────────────────────── */
.transmission-layer {
  position: absolute;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  overflow: visible;
}

.transmission-layer svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}

.tx-line {
  fill: none;
  stroke-width: 2.5;
  stroke-linecap: round;
  opacity: 0.6;
  stroke-dasharray: 8 4;
  filter: url(#txGlow);
}

.tx-line-exec    { stroke: var(--lavender); }
.tx-line-trust   { stroke: var(--mauve); }
.tx-line-cost    { stroke: var(--green); }
.tx-line-context { stroke: var(--sapphire); }

/* Glowing dot traveling along the line */
.tx-dot {
  r: 5;
  filter: url(#txGlow);
  opacity: 0.9;
}

.tx-dot-exec    { fill: var(--lavender); }
.tx-dot-trust   { fill: var(--mauve); }
.tx-dot-cost    { fill: var(--green); }
.tx-dot-context { fill: var(--sapphire); }

/* Each dot animates along its path at different speeds */
.tx-dot-exec    { animation: txPulse 3.2s ease-in-out infinite; }
.tx-dot-trust   { animation: txPulse 4.0s ease-in-out infinite 0.8s; }
.tx-dot-cost    { animation: txPulse 3.6s ease-in-out infinite 0.4s; }
.tx-dot-context { animation: txPulse 4.4s ease-in-out infinite 1.2s; }

@keyframes txPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* ================================================================
   CARD BASE — Frosted glass with animated gradient hover border
   ================================================================ */
.card {
  position: relative;
  background: rgba(24, 24, 37, 0.78);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  border: 1px solid rgba(69, 71, 90, 0.35);
  border-radius: 18px;
  padding: 24px 26px;
  opacity: 0;
  transform: translateY(20px);
  animation: cardEnter 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  transition: border-color 0.35s ease, box-shadow 0.35s ease, transform 0.3s ease;
  overflow: hidden;
}

/* Inner glow */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 18px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.35s ease;
}

.card:hover {
  transform: translateY(-3px);
}

.card:hover::after {
  opacity: 1;
}

/* Colored top accent bar — gradient, wider */
.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  opacity: 0.7;
  transition: opacity 0.35s ease, height 0.35s ease;
}

.card:hover::before {
  opacity: 1;
  height: 3px;
}

/* Per-panel accent colors + hover effects */
/* Command hub: 4 panels */
#panelExec  { animation-delay: 0.05s; }
#panelExec::before  { background: linear-gradient(90deg, var(--accent-exec), var(--blue), transparent 80%); }
#panelExec::after   { background: radial-gradient(ellipse at top left, rgba(180, 190, 254, 0.04), transparent 60%); }
#panelExec:hover    { border-color: rgba(180, 190, 254, 0.25); box-shadow: 0 12px 40px -10px rgba(180, 190, 254, 0.12), inset 0 1px 0 rgba(180, 190, 254, 0.06); }

#panelTrust { animation-delay: 0.10s; }
#panelTrust::before { background: linear-gradient(90deg, var(--accent-trust), var(--pink), transparent 80%); }
#panelTrust::after  { background: radial-gradient(ellipse at top left, rgba(203, 166, 247, 0.04), transparent 60%); }
#panelTrust:hover   { border-color: rgba(203, 166, 247, 0.25); box-shadow: 0 12px 40px -10px rgba(203, 166, 247, 0.12), inset 0 1px 0 rgba(203, 166, 247, 0.06); }

#panelCost  { animation-delay: 0.15s; }
#panelCost::before  { background: linear-gradient(90deg, var(--accent-cost), var(--teal), transparent 80%); }
#panelCost::after   { background: radial-gradient(ellipse at top left, rgba(166, 227, 161, 0.04), transparent 60%); }
#panelCost:hover    { border-color: rgba(166, 227, 161, 0.25); box-shadow: 0 12px 40px -10px rgba(166, 227, 161, 0.12), inset 0 1px 0 rgba(166, 227, 161, 0.06); }

#panelContext { animation-delay: 0.20s; }
#panelContext::before { background: linear-gradient(90deg, var(--accent-context), var(--blue), transparent 80%); }
#panelContext::after  { background: radial-gradient(ellipse at top left, rgba(116, 199, 236, 0.04), transparent 60%); }
#panelContext:hover   { border-color: rgba(116, 199, 236, 0.25); box-shadow: 0 12px 40px -10px rgba(116, 199, 236, 0.12), inset 0 1px 0 rgba(116, 199, 236, 0.06); }

/* Bottom row: Trail + Memory */
#panelTrail { animation-delay: 0.25s; }
#panelTrail::before { background: linear-gradient(90deg, var(--accent-trail), var(--green), transparent 80%); }
#panelTrail::after  { background: radial-gradient(ellipse at top left, rgba(148, 226, 213, 0.04), transparent 60%); }
#panelTrail:hover   { border-color: rgba(148, 226, 213, 0.25); box-shadow: 0 12px 40px -10px rgba(148, 226, 213, 0.12), inset 0 1px 0 rgba(148, 226, 213, 0.06); }

#panelMemory { animation-delay: 0.30s; }
#panelMemory::before { background: linear-gradient(90deg, var(--accent-memory), var(--mauve), transparent 80%); }
#panelMemory::after  { background: radial-gradient(ellipse at top left, rgba(245, 194, 231, 0.04), transparent 60%); }
#panelMemory:hover   { border-color: rgba(245, 194, 231, 0.25); box-shadow: 0 12px 40px -10px rgba(245, 194, 231, 0.12), inset 0 1px 0 rgba(245, 194, 231, 0.06); }

@keyframes cardEnter {
  to { opacity: 1; transform: translateY(0); }
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.card-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 1.1rem;
  color: var(--subtext1);
  letter-spacing: 0.10em;
  text-transform: uppercase;
}

/* ── Panel Icon Spritesheet ────────────────────────────────── */
/* 1536x1024 image, 3x2 grid = 512x512 per icon               */
.panel-icon {
  width: 110px;
  height: 110px;
  background-image: url('/assets/dashboardicons.png');
  background-size: 300% 200%; /* 3 cols x 2 rows */
  background-repeat: no-repeat;
  flex-shrink: 0;
  image-rendering: auto;
  filter: drop-shadow(0 0 8px rgba(180, 190, 254, 0.3));
  transition: filter 0.4s ease, transform 0.4s ease;
}
.card:hover .panel-icon {
  filter: drop-shadow(0 0 14px rgba(180, 190, 254, 0.5));
  transform: scale(1.12);
}

/* Row 1: Rocket, Crystal $, Windows */
.panel-icon-exec     { background-position: 0% 0%; }
.panel-icon-cost     { background-position: 50% 0%; }
.panel-icon-sessions { background-position: 100% 0%; }
/* Row 2: Shield, Brain, Path */
.panel-icon-trust    { background-position: 0% 100%; }
.panel-icon-memory   { background-position: 50% 100%; }
.panel-icon-trail    { background-position: 100% 100%; }

/* ================================================================
   BADGES & PILLS
   ================================================================ */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.03em;
}

.badge-wave {
  background: rgba(180, 190, 254, 0.12);
  color: var(--lavender);
  border: 1px solid rgba(180, 190, 254, 0.18);
}

.badge-phase {
  background: rgba(137, 180, 250, 0.12);
  color: var(--blue);
  border: 1px solid rgba(137, 180, 250, 0.18);
  margin-left: 6px;
}

.badge-project {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  border-radius: 10px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 600;
  background: linear-gradient(135deg, rgba(180, 190, 254, 0.1), rgba(137, 180, 250, 0.06));
  color: var(--lavender);
  border: 1px solid rgba(180, 190, 254, 0.15);
  letter-spacing: 0.02em;
}

.badge-project-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--lavender);
  box-shadow: 0 0 6px rgba(180, 190, 254, 0.5);
}

.tier-badge {
  display: inline-flex;
  align-items: center;
  padding: 5px 16px;
  border-radius: 20px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  border: 1px solid transparent;
}

.tier-intern     { background: rgba(108, 112, 134, 0.15); color: var(--overlay1); border-color: rgba(108, 112, 134, 0.2); }
.tier-junior     { background: rgba(137, 180, 250, 0.12); color: var(--blue); border-color: rgba(137, 180, 250, 0.18); }
.tier-senior     { background: rgba(166, 227, 161, 0.12); color: var(--green); border-color: rgba(166, 227, 161, 0.18); }
.tier-principal  { background: rgba(203, 166, 247, 0.12); color: var(--mauve); border-color: rgba(203, 166, 247, 0.18); }
.tier-new        { background: rgba(166, 173, 200, 0.08); color: var(--subtext0); border-color: rgba(166, 173, 200, 0.12); }

/* ================================================================
   TYPE BADGES (trail)
   ================================================================ */
.type-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 0.58rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.type-command      { background: rgba(116, 199, 236, 0.14); color: var(--sapphire); }
.type-decision     { background: rgba(180, 190, 254, 0.14); color: var(--lavender); }
.type-routing      { background: rgba(137, 180, 250, 0.14); color: var(--blue); }
.type-execution    { background: rgba(166, 227, 161, 0.14); color: var(--green); }
.type-error        { background: rgba(243, 139, 168, 0.14); color: var(--red); }
.type-governance   { background: rgba(203, 166, 247, 0.14); color: var(--mauve); }
.type-verification { background: rgba(148, 226, 213, 0.14); color: var(--teal); }
.type-recovery     { background: rgba(249, 226, 175, 0.14); color: var(--yellow); }
.type-default      { background: rgba(88, 91, 112, 0.14); color: var(--overlay1); }

/* ================================================================
   PROGRESS BAR
   ================================================================ */
.progress-track {
  width: 100%;
  height: 7px;
  background: var(--surface0);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--lavender), var(--blue));
  border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
  box-shadow: 0 0 10px rgba(180, 190, 254, 0.3);
}

.progress-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
  animation: shimmer 2.5s ease-in-out infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.progress-label {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--subtext0);
  margin-top: 8px;
}

/* ================================================================
   EMPTY STATE — CSS-only animated icons
   ================================================================ */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 36px 16px;
  text-align: center;
  gap: 14px;
}

.empty-text {
  color: var(--overlay1);
  font-size: 0.82rem;
  line-height: 1.6;
  font-weight: 400;
  max-width: 300px;
}

.empty-text code {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  background: rgba(180, 190, 254, 0.08);
  color: var(--lavender);
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid rgba(180, 190, 254, 0.1);
}

/* CSS-only animated icons for empty states */

/* Spinning gear icon */
.empty-icon-gear {
  width: 52px;
  height: 52px;
  position: relative;
  animation: gearSpin 8s linear infinite;
}

.empty-icon-gear::before {
  content: '';
  position: absolute;
  inset: 8px;
  border-radius: 50%;
  border: 3px solid rgba(180, 190, 254, 0.2);
}

.empty-icon-gear::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 3px dashed rgba(180, 190, 254, 0.12);
}

@keyframes gearSpin {
  to { transform: rotate(360deg); }
}

/* Pulsing concentric rings for memory */
.empty-icon-rings {
  width: 56px;
  height: 56px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ring {
  position: absolute;
  border-radius: 50%;
  border: 1.5px solid;
  animation: ringPulse 3s ease-in-out infinite;
}

.ring:nth-child(1) {
  width: 14px; height: 14px;
  border-color: rgba(245, 194, 231, 0.5);
  animation-delay: 0s;
}

.ring:nth-child(2) {
  width: 26px; height: 26px;
  border-color: rgba(245, 194, 231, 0.35);
  animation-delay: 0.3s;
}

.ring:nth-child(3) {
  width: 38px; height: 38px;
  border-color: rgba(245, 194, 231, 0.22);
  animation-delay: 0.6s;
}

.ring:nth-child(4) {
  width: 50px; height: 50px;
  border-color: rgba(245, 194, 231, 0.12);
  animation-delay: 0.9s;
}

@keyframes ringPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.12); opacity: 0.4; }
}

/* Animated chart bars for cost empty state */
.empty-icon-bars {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 40px;
  padding: 0 6px;
}

.bar-anim {
  width: 6px;
  border-radius: 3px 3px 0 0;
  animation: barGrow 2s ease-in-out infinite;
}

.bar-anim:nth-child(1) { background: rgba(166, 227, 161, 0.3); animation-delay: 0s; height: 16px; }
.bar-anim:nth-child(2) { background: rgba(166, 227, 161, 0.4); animation-delay: 0.15s; height: 24px; }
.bar-anim:nth-child(3) { background: rgba(148, 226, 213, 0.5); animation-delay: 0.3s; height: 32px; }
.bar-anim:nth-child(4) { background: rgba(148, 226, 213, 0.4); animation-delay: 0.45s; height: 20px; }
.bar-anim:nth-child(5) { background: rgba(166, 227, 161, 0.3); animation-delay: 0.6s; height: 28px; }

@keyframes barGrow {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(0.5); }
}

/* ================================================================
   PANEL 1: EXECUTION STATUS — Roadmap view
   ================================================================ */
.exec-wave-info {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}

.exec-roadmap {
  margin-top: 6px;
}

.exec-stats-row {
  display: flex;
  gap: 12px;
  margin-bottom: 18px;
}

.exec-stat {
  flex: 1;
  text-align: center;
  padding: 14px 8px;
  background: rgba(49, 50, 68, 0.25);
  border-radius: 12px;
  border: 1px solid rgba(69, 71, 90, 0.2);
  transition: border-color 0.25s ease, background 0.25s ease;
}

.exec-stat:hover {
  border-color: rgba(180, 190, 254, 0.2);
  background: rgba(49, 50, 68, 0.4);
}

.exec-stat-num {
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 2rem;
  line-height: 1;
  background: linear-gradient(135deg, var(--lavender), var(--blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.exec-stat-label {
  font-family: var(--font-mono);
  font-size: 0.56rem;
  color: var(--overlay1);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 6px;
}

.wave-grid {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
}

.wave-block {
  flex: 1;
  position: relative;
  padding: 10px 8px;
  background: rgba(49, 50, 68, 0.2);
  border-radius: 10px;
  border: 1px solid rgba(69, 71, 90, 0.15);
  text-align: center;
  transition: all 0.3s ease;
  cursor: default;
  overflow: hidden;
}

.wave-block::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--surface1);
  transition: background 0.3s ease;
}

.wave-block:hover {
  background: rgba(49, 50, 68, 0.4);
  border-color: rgba(180, 190, 254, 0.2);
}

.wave-block.wave-complete::before { background: var(--green); box-shadow: 0 0 8px rgba(166, 227, 161, 0.3); }
.wave-block.wave-active::before { background: var(--lavender); box-shadow: 0 0 8px rgba(180, 190, 254, 0.3); animation: wavePulse 2s ease-in-out infinite; }
.wave-block.wave-active { border-color: rgba(180, 190, 254, 0.25); background: rgba(180, 190, 254, 0.04); }
.wave-block.wave-pending::before { background: var(--surface1); }

@keyframes wavePulse {
  0%, 100% { box-shadow: 0 0 6px rgba(180, 190, 254, 0.2); }
  50% { box-shadow: 0 0 14px rgba(180, 190, 254, 0.5); }
}

.wave-block-id {
  font-family: var(--font-mono);
  font-size: 0.56rem;
  font-weight: 600;
  color: var(--overlay1);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.wave-block-count {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  margin-top: 2px;
  line-height: 1;
}

.wave-block-label {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  color: var(--overlay0);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 3px;
}

.wave-block.wave-complete .wave-block-count { color: var(--green); }
.wave-block.wave-active .wave-block-count { color: var(--lavender); }

.exec-project-name {
  font-family: var(--font-mono);
  font-size: 0.64rem;
  color: var(--overlay1);
  margin-top: 10px;
  padding: 8px 12px;
  background: rgba(49, 50, 68, 0.15);
  border-radius: 8px;
  border-left: 2px solid rgba(180, 190, 254, 0.2);
}

.exec-project-name strong {
  color: var(--subtext1);
  font-weight: 500;
}

.exec-last-result {
  margin-top: 14px;
  padding: 12px 16px;
  background: rgba(49, 50, 68, 0.3);
  border-radius: 12px;
  border-left: 3px solid var(--lavender);
  box-shadow: inset 0 0 20px rgba(180, 190, 254, 0.02);
}

.exec-last-result .label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--subtext0);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

.exec-last-result .value {
  font-size: 0.8rem;
  color: var(--text);
}

/* ================================================================
   PANEL 2: TRUST & GOVERNANCE
   ================================================================ */
.trust-top {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 14px;
}

.gauge-container {
  position: relative;
  flex-shrink: 0;
}

.gauge-container svg {
  filter: drop-shadow(0 0 10px var(--gauge-glow, transparent));
  transition: filter 0.4s ease;
}

.gauge-track {
  fill: none;
  stroke: rgba(49, 50, 68, 0.8);
  stroke-width: 6;
}

.gauge-fill {
  fill: none;
  stroke-width: 6;
  stroke-linecap: round;
  transform: rotate(-90deg);
  transform-origin: center;
  transition: stroke-dashoffset 1.2s cubic-bezier(0.22, 1, 0.36, 1), stroke 0.4s ease;
}

.gauge-value {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.gauge-number {
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 1.8rem;
  line-height: 1;
  color: var(--text);
}

.gauge-label-sm {
  font-family: var(--font-mono);
  font-size: 0.52rem;
  color: var(--overlay1);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-top: 3px;
}

.trust-meta {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-top: 4px;
}

.compliance-bar { margin-top: 2px; }

.compliance-label {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--overlay1);
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.compliance-track {
  width: 100%;
  height: 5px;
  background: rgba(49, 50, 68, 0.6);
  border-radius: 3px;
  overflow: hidden;
}

.compliance-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal), var(--green));
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  box-shadow: 0 0 8px rgba(148, 226, 213, 0.2);
}

.gov-decisions {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.gov-decision-item {
  padding: 9px 14px;
  background: rgba(49, 50, 68, 0.2);
  border-radius: 10px;
  border-left: 2px solid var(--mauve);
  font-size: 0.75rem;
  color: var(--subtext0);
  line-height: 1.4;
  transition: background 0.25s ease, border-color 0.25s ease;
}

.gov-decision-item:hover {
  background: rgba(49, 50, 68, 0.4);
  border-color: var(--pink);
}

.gov-decision-item .decision-time {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--overlay0);
  letter-spacing: 0.02em;
}

/* ================================================================
   PANEL 3: COST INTELLIGENCE
   ================================================================ */
.cost-hero {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 4px;
}

.cost-big-number {
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 2.8rem;
  line-height: 1;
  background: linear-gradient(135deg, var(--green), var(--teal));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 16px rgba(166, 227, 161, 0.2));
}

.cost-big-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--overlay1);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 18px;
}

.cost-comparison {
  display: flex;
  gap: 12px;
  margin-bottom: 18px;
}

.cost-bar-group { flex: 1; }

.cost-bar-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}

.cost-bar-name {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--overlay1);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.cost-bar-value {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text);
}

.cost-bar-track {
  width: 100%;
  height: 6px;
  background: rgba(49, 50, 68, 0.5);
  border-radius: 3px;
  overflow: hidden;
}

.cost-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}

.cost-bar-fill.actual { background: linear-gradient(90deg, var(--green), var(--teal)); box-shadow: 0 0 8px rgba(166, 227, 161, 0.2); }
.cost-bar-fill.opus   { background: linear-gradient(90deg, var(--mauve), var(--pink)); box-shadow: 0 0 8px rgba(203, 166, 247, 0.2); }

.model-dist { margin-top: 4px; }

.model-dist-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--overlay1);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

.model-stacked-bar {
  width: 100%;
  height: 10px;
  background: rgba(49, 50, 68, 0.4);
  border-radius: 5px;
  overflow: hidden;
  display: flex;
}

.model-stacked-bar .segment {
  height: 100%;
  transition: width 0.6s ease;
}

.segment-haiku   { background: linear-gradient(90deg, var(--teal), #7dd6c6); }
.segment-sonnet  { background: linear-gradient(90deg, var(--blue), #a0c8fc); }
.segment-opus    { background: linear-gradient(90deg, var(--mauve), #d6b8fa); }
.segment-unknown { background: linear-gradient(90deg, var(--surface1), var(--surface2)); }

.model-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-top: 10px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--overlay1);
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* Routing stat metric */
.cost-routing-stat {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding: 10px 14px;
  background: rgba(49, 50, 68, 0.2);
  border-radius: 10px;
  border: 1px solid rgba(69, 71, 90, 0.15);
}

.cost-routing-num {
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 1.8rem;
  line-height: 1;
  background: linear-gradient(135deg, var(--green), var(--teal));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.cost-routing-label {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--overlay1);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  line-height: 1.4;
}

/* ================================================================
   PANEL 4: SESSIONS & CONTEXT
   ================================================================ */
.context-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 10px 0;
}

.context-level {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 0.82rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.level-normal   { color: var(--green); text-shadow: 0 0 16px rgba(166, 227, 161, 0.3); }
.level-warning  { color: var(--yellow); text-shadow: 0 0 16px rgba(249, 226, 175, 0.3); }
.level-urgent   { color: var(--peach); text-shadow: 0 0 16px rgba(250, 179, 135, 0.3); }
.level-critical { color: var(--red); text-shadow: 0 0 16px rgba(243, 139, 168, 0.4); }
.level-emergency { color: var(--red); text-shadow: 0 0 24px rgba(243, 139, 168, 0.6); animation: emergencyFlash 1s ease-in-out infinite; }

@keyframes emergencyFlash {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.pulse-warning { animation: pulseWarn 1.5s ease-in-out infinite; }

@keyframes pulseWarn {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* Session count badge in card header */
.session-count-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 12px;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  background: rgba(116, 199, 236, 0.1);
  color: var(--sapphire);
  border: 1px solid rgba(116, 199, 236, 0.15);
}

/* Project group header */
.session-project-group {
  margin-bottom: 10px;
}

.session-project-group:last-child {
  margin-bottom: 0;
}

.session-project-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 0 8px;
  font-family: var(--font-mono);
  font-size: 0.64rem;
  font-weight: 600;
  color: var(--subtext0);
  letter-spacing: 0.03em;
}

.session-project-header svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

/* Session scroll container */
.sessions-scroll {
  max-height: 360px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--surface1) transparent;
}

.sessions-scroll::-webkit-scrollbar { width: 4px; }
.sessions-scroll::-webkit-scrollbar-track { background: transparent; }
.sessions-scroll::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 2px; }

.sessions-hidden-note {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--overlay0);
  text-align: center;
  padding: 8px 0 2px;
  letter-spacing: 0.02em;
}

/* Session card */
.session-card {
  position: relative;
  background: rgba(49, 50, 68, 0.2);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 6px;
  border: 1px solid rgba(69, 71, 90, 0.2);
  border-left: 3px solid var(--surface1);
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  animation: fadeInUp 0.3s ease both;
}

.session-card:last-child {
  margin-bottom: 0;
}

.session-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px -6px rgba(0, 0, 0, 0.3);
}

.session-card.session-stale {
  opacity: 0.5;
}

/* IDE border accents */
.session-card.ide-claude-code   { border-left-color: var(--lavender); }
.session-card.ide-cursor        { border-left-color: var(--blue); }
.session-card.ide-windsurf      { border-left-color: var(--teal); }
.session-card.ide-kiro          { border-left-color: var(--green); }
.session-card.ide-copilot       { border-left-color: var(--mauve); }
.session-card.ide-cline         { border-left-color: var(--peach); }
.session-card.ide-roo-code      { border-left-color: var(--flamingo); }
.session-card.ide-kilo-code     { border-left-color: var(--yellow); }
.session-card.ide-default       { border-left-color: var(--overlay1); }

.session-card.ide-claude-code:hover  { border-left-color: var(--lavender); box-shadow: 0 6px 20px -6px rgba(180, 190, 254, 0.15); }
.session-card.ide-cursor:hover       { border-left-color: var(--blue); box-shadow: 0 6px 20px -6px rgba(137, 180, 250, 0.15); }
.session-card.ide-windsurf:hover     { border-left-color: var(--teal); box-shadow: 0 6px 20px -6px rgba(148, 226, 213, 0.15); }
.session-card.ide-kiro:hover         { border-left-color: var(--green); box-shadow: 0 6px 20px -6px rgba(166, 227, 161, 0.15); }
.session-card.ide-copilot:hover      { border-left-color: var(--mauve); box-shadow: 0 6px 20px -6px rgba(203, 166, 247, 0.15); }

/* Session card top row */
.session-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

/* IDE badge pill */
.ide-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 10px;
  font-family: var(--font-mono);
  font-size: 0.56rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: capitalize;
  white-space: nowrap;
}

.ide-badge-claude-code  { background: rgba(180, 190, 254, 0.14); color: var(--lavender); }
.ide-badge-cursor       { background: rgba(137, 180, 250, 0.14); color: var(--blue); }
.ide-badge-windsurf     { background: rgba(148, 226, 213, 0.14); color: var(--teal); }
.ide-badge-kiro         { background: rgba(166, 227, 161, 0.14); color: var(--green); }
.ide-badge-copilot      { background: rgba(203, 166, 247, 0.14); color: var(--mauve); }
.ide-badge-cline        { background: rgba(250, 179, 135, 0.14); color: var(--peach); }
.ide-badge-roo-code     { background: rgba(242, 205, 205, 0.14); color: var(--flamingo); }
.ide-badge-kilo-code    { background: rgba(249, 226, 175, 0.14); color: var(--yellow); }
.ide-badge-default      { background: rgba(88, 91, 112, 0.14); color: var(--overlay1); }

/* Level badge inline */
.session-level-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 0.52rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.session-level-NORMAL    { background: rgba(166, 227, 161, 0.12); color: var(--green); }
.session-level-WARNING   { background: rgba(249, 226, 175, 0.12); color: var(--yellow); }
.session-level-URGENT    { background: rgba(250, 179, 135, 0.12); color: var(--peach); }
.session-level-CRITICAL  { background: rgba(243, 139, 168, 0.14); color: var(--red); }
.session-level-EMERGENCY { background: rgba(243, 139, 168, 0.18); color: var(--red); animation: emergencyFlash 1s ease-in-out infinite; }

/* Session progress bar (mini) */
.session-progress-track {
  width: 100%;
  height: 4px;
  background: var(--surface0);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 8px;
}

.session-progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  width: 0%;
}

.session-progress-fill.sp-green  { background: linear-gradient(90deg, var(--green), var(--teal)); box-shadow: 0 0 6px rgba(166, 227, 161, 0.2); }
.session-progress-fill.sp-yellow { background: linear-gradient(90deg, var(--yellow), var(--peach)); box-shadow: 0 0 6px rgba(249, 226, 175, 0.2); }
.session-progress-fill.sp-orange { background: linear-gradient(90deg, var(--peach), var(--red)); box-shadow: 0 0 6px rgba(250, 179, 135, 0.2); }
.session-progress-fill.sp-red    { background: linear-gradient(90deg, var(--red), #eb6f92); box-shadow: 0 0 6px rgba(243, 139, 168, 0.3); }

/* Session card bottom row */
.session-card-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.session-pct {
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 1.3rem;
  line-height: 1;
  color: var(--text);
}

.session-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}

.session-project-path {
  font-family: var(--font-mono);
  font-size: 0.56rem;
  color: var(--overlay1);
  letter-spacing: 0.02em;
}

.session-freshness {
  font-family: var(--font-mono);
  font-size: 0.52rem;
  color: var(--overlay0);
  letter-spacing: 0.02em;
}

.session-freshness.stale-label {
  color: var(--red);
  font-weight: 600;
}

.session-id {
  font-family: var(--font-mono);
  font-size: 0.48rem;
  color: var(--overlay0);
  letter-spacing: 0.02em;
  opacity: 0.7;
}

/* Header session indicator */
.session-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 14px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  background: rgba(49, 50, 68, 0.3);
  border: 1px solid rgba(49, 50, 68, 0.5);
  transition: all 0.4s ease;
}

.session-indicator-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  transition: all 0.4s ease;
}

.session-indicator-dot.si-green  { background: var(--green); box-shadow: 0 0 6px rgba(166, 227, 161, 0.5); }
.session-indicator-dot.si-yellow { background: var(--yellow); box-shadow: 0 0 6px rgba(249, 226, 175, 0.5); }
.session-indicator-dot.si-red    { background: var(--red); box-shadow: 0 0 6px rgba(243, 139, 168, 0.5); }
.session-indicator-dot.si-off    { background: var(--overlay0); }

.session-indicator-label {
  color: var(--subtext0);
  transition: color 0.4s ease;
}

/* Radar / pulse icon for empty sessions state */
.session-radar-icon {
  width: 64px;
  height: 64px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.radar-center {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--sapphire);
  box-shadow: 0 0 10px rgba(116, 199, 236, 0.4);
  z-index: 2;
}

.radar-ring {
  position: absolute;
  border-radius: 50%;
  border: 1.5px solid rgba(116, 199, 236, 0.4);
  opacity: 0;
  animation: radarExpand 3s ease-out infinite;
}

.radar-ring:nth-child(2) { animation-delay: 0s; }
.radar-ring:nth-child(3) { animation-delay: 0.75s; }
.radar-ring:nth-child(4) { animation-delay: 1.5s; }
.radar-ring:nth-child(5) { animation-delay: 2.25s; }

@keyframes radarExpand {
  0% { width: 8px; height: 8px; opacity: 0.8; border-color: rgba(116, 199, 236, 0.6); }
  100% { width: 60px; height: 60px; opacity: 0; border-color: rgba(116, 199, 236, 0); }
}

.session-empty-title {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--subtext0);
  letter-spacing: 0.04em;
}

.session-empty-desc {
  font-size: 0.74rem;
  color: var(--overlay1);
  text-align: center;
  max-width: 260px;
  line-height: 1.6;
}

/* ================================================================
   PANEL 5: DECISION TRAIL — Terminal aesthetic
   ================================================================ */
.card-trail {
  background: rgba(14, 14, 22, 0.92) !important;
}

.trail-header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.trail-count {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--overlay0);
}

.live-indicator {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 12px;
  background: rgba(166, 227, 161, 0.06);
  border: 1px solid rgba(166, 227, 161, 0.12);
}

.live-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--green);
  animation: livePulse 2s ease-in-out infinite;
}

@keyframes livePulse {
  0%, 100% { box-shadow: 0 0 4px rgba(166, 227, 161, 0.5); opacity: 1; }
  50% { box-shadow: 0 0 12px rgba(166, 227, 161, 0.8); opacity: 0.6; }
}

.live-text {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  font-weight: 600;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.trail-scroll {
  max-height: 300px;
  overflow-y: auto;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  line-height: 1.6;
  scrollbar-width: thin;
  scrollbar-color: var(--surface1) transparent;
  position: relative;
  -webkit-mask-image: linear-gradient(to bottom, black 0%, black 85%, transparent 100%);
  mask-image: linear-gradient(to bottom, black 0%, black 85%, transparent 100%);
}

.trail-scroll::-webkit-scrollbar { width: 4px; }
.trail-scroll::-webkit-scrollbar-track { background: transparent; }
.trail-scroll::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 2px; }

.trail-entry {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 6px 8px;
  border-bottom: 1px solid rgba(49, 50, 68, 0.15);
  transition: background 0.2s ease;
  border-radius: 4px;
}

.trail-entry:hover {
  background: rgba(49, 50, 68, 0.2);
}

.trail-entry:last-child { border-bottom: none; }

.trail-ts {
  color: var(--overlay0);
  font-size: 0.6rem;
  white-space: nowrap;
  flex-shrink: 0;
  font-weight: 400;
}

.trail-desc {
  color: var(--subtext0);
  word-break: break-word;
}

.trail-cursor {
  padding: 6px 8px;
  animation: cursorBlink 1.2s step-end infinite;
}

.trail-cursor::after {
  content: '\2588';
  color: var(--teal);
  font-size: 0.7rem;
  opacity: 0.7;
}

@keyframes cursorBlink {
  0%, 50% { opacity: 1; }
  50.01%, 100% { opacity: 0; }
}

.trail-empty {
  color: var(--overlay0);
  font-style: italic;
  padding: 32px 0;
  text-align: center;
  font-size: 0.72rem;
}

/* ================================================================
   PANEL 6: INTELLIGENCE MEMORY
   ================================================================ */
.memory-stats-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.memory-stat-box {
  flex: 1;
  text-align: center;
  padding: 14px 8px;
  background: rgba(49, 50, 68, 0.2);
  border-radius: 12px;
  border: 1px solid rgba(69, 71, 90, 0.18);
  transition: border-color 0.25s ease, background 0.25s ease, transform 0.25s ease;
}

.memory-stat-box:hover {
  border-color: rgba(245, 194, 231, 0.2);
  background: rgba(49, 50, 68, 0.4);
  transform: translateY(-1px);
}

.memory-stat-num {
  font-family: var(--font-mono);
  font-weight: 800;
  font-size: 1.6rem;
  color: var(--text);
  line-height: 1;
}

.memory-stat-label {
  font-family: var(--font-mono);
  font-size: 0.54rem;
  color: var(--overlay1);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 6px;
}

.reflexion-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.reflexion-item {
  padding: 10px 14px;
  background: rgba(49, 50, 68, 0.2);
  border-radius: 12px;
  border-left: 2px solid var(--lavender);
  cursor: pointer;
  transition: background 0.25s ease, border-color 0.25s ease;
}

.reflexion-item:hover {
  background: rgba(49, 50, 68, 0.4);
  border-color: var(--pink);
}

.reflexion-task {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 2px;
}

.reflexion-lesson {
  font-size: 0.7rem;
  color: var(--subtext0);
  line-height: 1.4;
  display: none;
}

.reflexion-item.expanded .reflexion-lesson {
  display: block;
  margin-top: 6px;
}

.reflexion-outcome {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.58rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 2px 8px;
  border-radius: 4px;
  margin-top: 4px;
}

.outcome-success { background: rgba(166, 227, 161, 0.12); color: var(--green); }
.outcome-failure { background: rgba(243, 139, 168, 0.12); color: var(--red); }
.outcome-partial { background: rgba(249, 226, 175, 0.12); color: var(--yellow); }

/* Memory empty state — enhanced */
.memory-empty-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 30px 16px;
}

.memory-neural-icon {
  width: 72px;
  height: 72px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.neural-core {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--pink);
  box-shadow: 0 0 16px rgba(245, 194, 231, 0.4);
  animation: coreGlow 2s ease-in-out infinite;
  z-index: 2;
}

@keyframes coreGlow {
  0%, 100% { box-shadow: 0 0 12px rgba(245, 194, 231, 0.3); transform: scale(1); }
  50% { box-shadow: 0 0 24px rgba(245, 194, 231, 0.6); transform: scale(1.15); }
}

.neural-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid;
  opacity: 0;
  animation: neuralRingExpand 3s ease-out infinite;
}

.neural-ring:nth-child(2) { animation-delay: 0s; }
.neural-ring:nth-child(3) { animation-delay: 0.7s; }
.neural-ring:nth-child(4) { animation-delay: 1.4s; }
.neural-ring:nth-child(5) { animation-delay: 2.1s; }

@keyframes neuralRingExpand {
  0% { width: 12px; height: 12px; opacity: 0.7; border-color: rgba(245, 194, 231, 0.5); }
  100% { width: 68px; height: 68px; opacity: 0; border-color: rgba(245, 194, 231, 0); }
}

.neural-particles {
  position: absolute;
  inset: 0;
}

.neural-particle {
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--pink);
  opacity: 0;
  animation: particleOrbit 4s linear infinite;
}

.neural-particle:nth-child(1) { animation-delay: 0s; left: 50%; top: 0; }
.neural-particle:nth-child(2) { animation-delay: 1s; right: 0; top: 50%; }
.neural-particle:nth-child(3) { animation-delay: 2s; left: 50%; bottom: 0; }
.neural-particle:nth-child(4) { animation-delay: 3s; left: 0; top: 50%; }

@keyframes particleOrbit {
  0% { opacity: 0; transform: scale(0); }
  20% { opacity: 0.6; transform: scale(1); }
  80% { opacity: 0.3; transform: scale(0.8); }
  100% { opacity: 0; transform: scale(0); }
}

.memory-empty-title {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--subtext0);
  letter-spacing: 0.04em;
}

.memory-empty-desc {
  font-size: 0.76rem;
  color: var(--overlay1);
  text-align: center;
  max-width: 260px;
  line-height: 1.6;
}

/* ================================================================
   ANIMATIONS
   ================================================================ */
.value-changed {
  animation: valueGlow 1s ease;
}

@keyframes valueGlow {
  0% { text-shadow: 0 0 20px rgba(180, 190, 254, 0.7); }
  100% { text-shadow: none; }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ================================================================
   UTILITY
   ================================================================ */
.hidden { display: none !important; }

/* ================================================================
   SCROLLBAR STYLES
   ================================================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--surface2); }
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg-layer">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>

</div>

<!-- ============================================================
     HEADER
     ============================================================ -->
<header class="header">

<script>
/* ================================================================
   GLOBALS
   ================================================================ */
var connected = false;
var lastTrailCount = 0;
var cachedState = null;
var cachedMemory = null;
var cachedTrail = null;

/* ================================================================
   HELPERS
   ================================================================ */
function $(id) { return document.getElementById(id); }

function el(tag, attrs, children) {
  var node = document.createElement(tag);
  if (attrs) {
    for (var k in attrs) {
      if (!attrs.hasOwnProperty(k)) continue;
      var v = attrs[k];
      if (k === 'className') node.className = v;
      else if (k === 'textContent') node.textContent = v;
      else if (k === 'innerHTML') node.innerHTML = v;
      else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
      else node.setAttribute(k, v);
    }
  }
  if (children) {
    if (typeof children === 'string') node.textContent = children;
    else if (Array.isArray(children)) children.forEach(function(c) { if (c) node.appendChild(c); });
    else node.appendChild(children);
  }
  return node;
}

function svgEl(tag, attrs) {
  var node = document.createElementNS('http://www.w3.org/2000/svg', tag);
  if (attrs) for (var k in attrs) { if (attrs.hasOwnProperty(k)) node.setAttribute(k, attrs[k]); }
  return node;
}

function clearNode(node) {
  while (node.firstChild) node.removeChild(node.firstChild);
}

function fmt$(val) {
  if (val == null || isNaN(val)) return '$0.00';
  return '$' + val.toFixed(4);
}

function fmtTs(iso) {
  if (!iso) return '--:--';
  try {
    var d = new Date(iso);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch(e) { return '--:--'; }
}

function setConnected(val) {
  connected = val;
  var ind = $('connIndicator');
  var label = ind.querySelector('.connection-label');
  if (val) {
    ind.classList.add('connected');
    label.textContent = 'Connected';
  } else {
    ind.classList.remove('connected');
    label.textContent = 'Offline';
  }
}

/* ================================================================
   CLOCK
   ================================================================ */
function tickClock() {
  $('headerTime').textContent = new Date().toLocaleTimeString([], {
    hour: '2-digit', minute: '2-digit', second: '2-digit',
  });
}
tickClock();
setInterval(tickClock, 1000);

/* ================================================================
   GAUGE SVG BUILDER — With gradient stroke + glow
   ================================================================ */
function buildGauge(pct, gradientColors, size, glowColor) {
  size = size || 110;
  var r = 40;
  var circ = 2 * Math.PI * r;
  var offset = circ - (circ * Math.max(0, Math.min(100, pct)) / 100);
  var gradId = 'gauge-grad-' + Math.random().toString(36).substr(2, 6);

  var container = el('div', { className: 'gauge-container' });
  container.style.width = size + 'px';
  container.style.height = size + 'px';

  var svg = svgEl('svg', { viewBox: '0 0 100 100', width: String(size), height: String(size) });

  // Gradient definition
  var defs = svgEl('defs');
  var grad = svgEl('linearGradient', { id: gradId, x1: '0%', y1: '0%', x2: '100%', y2: '100%' });
  if (typeof gradientColors === 'string') {
    gradientColors = [gradientColors, gradientColors];
  }
  for (var i = 0; i < gradientColors.length; i++) {
    var stop = svgEl('stop', {
      offset: (i / (gradientColors.length - 1) * 100) + '%',
      'stop-color': gradientColors[i]
    });
    grad.appendChild(stop);
  }
  defs.appendChild(grad);
  svg.appendChild(defs);

  var track = svgEl('circle', { cx: '50', cy: '50', r: String(r), class: 'gauge-track' });
  var fill = svgEl('circle', {
    cx: '50', cy: '50', r: String(r),
    class: 'gauge-fill',
    stroke: 'url(#' + gradId + ')',
    'stroke-dasharray': String(circ),
    'stroke-dashoffset': String(circ),
  });

  svg.appendChild(track);
  svg.appendChild(fill);

  // Glow
  if (glowColor) {
    svg.style.filter = 'drop-shadow(0 0 10px ' + glowColor + ')';
  }

  container.appendChild(svg);

  var valWrap = el('div', { className: 'gauge-value' });
  var numEl = el('span', { className: 'gauge-number', textContent: Math.round(pct) });
  var labEl = el('span', { className: 'gauge-label-sm' });
  valWrap.appendChild(numEl);
  valWrap.appendChild(labEl);
  container.appendChild(valWrap);

  // Animate stroke on load
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      fill.setAttribute('stroke-dashoffset', String(offset));
    });
  });

  return { container: container, numEl: numEl, labEl: labEl };
}
